<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日邀请函-缤纷派对·实体礼盒版</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #fffdf0; touch-action: none; color: #333; }
    
    body::before {
        content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
        background: radial-gradient(circle at 20% 20%, rgba(255, 220, 100, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(255, 190, 100, 0.2) 0%, transparent 50%);
    }

    canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .swiper-container { width: 100%; height: 100%; display: flex; flex-direction: column; transition: transform 0.7s cubic-bezier(0.22,1,0.36,1); z-index: 10; }
    .page { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    
    /* 2.5D实体礼物盒 */
    .gift-3d {
        position: absolute; z-index: 0; pointer-events: none;
        transform-style: preserve-3d;
    }
    .gift-3d .face { position: absolute; backface-visibility: hidden; }
    .gift-3d .front { width: 100%; height: 70%; bottom: 0; left: 0; border-radius: 4px; }
    .gift-3d .top { 
        width: 100%; height: 30%; top: 0; left: 0; 
        transform: skewX(-30deg) translateY(-15%); transform-origin: bottom left; border-radius: 4px;
    }
    .gift-3d .side { 
        width: 30%; height: 70%; bottom: 0; right: -15%; 
        transform: skewY(-30deg); transform-origin: top left; border-radius: 4px;
    }
    .gift-3d .ribbon-v { 
        position: absolute; left: 50%; top: 0; width: 12%; height: 100%; 
        background: rgba(255,255,255,0.4); transform: translateX(-50%); z-index: 2;
    }
    .gift-3d .ribbon-h { 
        position: absolute; top: 35%; left: 0; width: 100%; height: 12%; 
        background: rgba(255,255,255,0.4); z-index: 2;
    }

    .balloons { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .balloon {
        position: absolute; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: floatUp linear infinite;
    }
    .balloon::after {
        content: ""; position: absolute; bottom: -15px; left: 50%; width: 1px; height: 15px;
        background: rgba(0,0,0,0.15); transform: translateX(-50%);
    }

    @keyframes floatUp {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.85; }
        90% { opacity: 0.85; }
        100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    .title { font-size: 3rem; font-weight: 900; letter-spacing: 6px; color: #b71c1c; text-shadow: 0 2px 10px rgba(183, 28, 28, 0.15); margin-bottom: 10px; z-index: 2; }
    .sub-title { font-size: 1rem; color: #2a9d8f; letter-spacing: 5px; margin-bottom: 40px; z-index: 2; }
    .date { font-size: 0.9rem; color: #666; letter-spacing: 4px; border-bottom: 1px solid rgba(183, 28, 28, 0.3); padding-bottom: 8px; z-index: 2; }

    .card {
        z-index: 10; width: 85%; max-width: 400px; background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px); border: 1px solid rgba(183, 28, 28, 0.15);
        border-radius: 20px; padding: 45px 30px; text-align: center;
        box-shadow: 0 15px 50px rgba(0,0,0,0.06);
    }
    .card-name { font-size: 2rem; color: #b71c1c; margin-bottom: 8px; letter-spacing: 4px; }
    .card-dept { font-size: 0.85rem; color: #2a9d8f; margin-bottom: 25px; letter-spacing: 3px; opacity: 0.8; }
    .card-blessing { text-align: left; font-size: 1rem; line-height: 2.2; color: #444; text-indent: 2em; margin-bottom: 30px; }
    .card-footer { font-size: 0.8rem; color: #e9c46a; letter-spacing: 4px; border-top: 1px dashed rgba(183, 28, 28, 0.3); padding-top: 18px; font-weight: bold; }

    .arrow {
        position: absolute; bottom: 35px; left: 50%; width: 22px; height: 22px;
        border-right: 2px solid #b71c1c; border-bottom: 2px solid #b71c1c;
        transform: translateX(-50%) rotate(45deg); animation: bounce 2s infinite;
        cursor: pointer; z-index: 20; opacity: 0.6;
    }
    @keyframes bounce { 0%,100%{transform:translateX(-50%) rotate(45deg) translateY(0)} 50%{transform:translateX(-50%) rotate(45deg) translateY(-10px)} }
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div id="bg-decor"></div>
<div class="balloons" id="balloon-container"></div>

<div class="swiper-container" id="swiper">
    <div class="page">
        <div class="title">生日快乐</div>
        <div class="sub-title">愿每一天都闪闪发光</div>
        <div class="date">{{year}}</div>
        <div class="arrow" onclick="nextPage()" style="transform:translateX(-50%) rotate(-45deg);"></div>
    </div>
    <div class="page">
        <div class="card">
            <div class="card-name">{{name}}</div>
            <div class="card-dept">{{department}}</div>
            <!-- editable-start -->
            <div class="card-blessing">{{blessing}}</div>
            <!-- editable-end -->
            <div class="card-footer">🎂 生日快乐 · 万事胜意</div>
        </div>
        <div class="arrow" onclick="prevPage()" style="transform:translateX(-50%) rotate(135deg);animation:none;"></div>
    </div>
</div>

<script>
    // === 翻页逻辑 ===
    let currentPage=0;const swiper=document.getElementById('swiper');
    function nextPage(){if(currentPage<1){currentPage++;updateSlide();}}
    function prevPage(){if(currentPage>0){currentPage--;updateSlide();}}
    function updateSlide(){swiper.style.transform=`translateY(-${currentPage*100}vh)`;}
    let tSY=0;document.addEventListener('touchstart',e=>{tSY=e.touches[0].clientY},{passive:false});
    document.addEventListener('touchend',e=>{let d=tSY-e.changedTouches[0].clientY;if(d>50)nextPage();else if(d<-50)prevPage();});
    document.addEventListener('wheel',e=>{e.preventDefault();if(e.deltaY>0)nextPage();else prevPage();},{passive:false});

    // === 2.5D实体礼物盒生成（四周+大小混合）===
    const giftColors = ['#8b0000', '#b71c1c', '#1b5e20', '#0d47a1', '#4a148c', '#e65100'];
    const decorContainer = document.getElementById('bg-decor');
    
    // 预设6个位置：4个小盒在四角边缘，2个大盒在左右/上下边缘中部
    const giftConfigs = [
        { x: 2, y: 2, size: 90, isLarge: false },   // 左上小
        { x: 88, y: 3, size: 85, isLarge: false },  // 右上小
        { x: 3, y: 88, size: 95, isLarge: false },  // 左下小
        { x: 87, y: 87, size: 80, isLarge: false }, // 右下小
        { x: -5, y: 45, size: 180, isLarge: true }, // 左侧大
        { x: 85, y: 50, size: 170, isLarge: true }  // 右侧大
    ];

    giftConfigs.forEach(cfg => {
        const color = giftColors[Math.floor(Math.random() * giftColors.length)];
        const rotate = Math.random() * 20 - 10;
        const opacity = cfg.isLarge ? 0.25 : 0.18;
        
        // 计算三个面的颜色深浅
        const frontColor = color;
        const topColor = `color-mix(in srgb, ${color} 80%, white)`;
        const sideColor = `color-mix(in srgb, ${color} 60%, black)`;
        
        const gift = document.createElement('div');
        gift.className = 'gift-3d';
        gift.style.cssText = `left:${cfg.x}%;top:${cfg.y}%;width:${cfg.size}px;height:${cfg.size}px;transform:rotate(${rotate}deg);opacity:${opacity};`;
        gift.innerHTML = `
            <div class="face front" style="background:${frontColor}"><div class="ribbon-v"></div><div class="ribbon-h"></div></div>
            <div class="face top" style="background:${topColor}"><div class="ribbon-v"></div></div>
            <div class="face side" style="background:${sideColor}"><div class="ribbon-h"></div></div>
        `;
        decorContainer.appendChild(gift);
    });

    // === 气球生成 ===
    const balloonColors = ['#e63946', '#f4a261', '#2a9d8f', '#457b9d', '#e9c46a', '#d62828', '#ffd700'];
    const balloonContainer = document.getElementById('balloon-container');
    for(let i=0; i<12; i++){
        const size = Math.random() * 30 + 30;
        const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
        const x = Math.random() * 95;
        const duration = Math.random() * 8 + 8;
        const delay = Math.random() * 10;
        
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.style.cssText = `left:${x}%;bottom:-60px;width:${size}px;height:${size*1.2}px;background:${color};animation-duration:${duration}s;animation-delay:${delay}s;`;
        balloonContainer.appendChild(balloon);
    }

    // === 彩色纸屑特效 ===
    const c=document.getElementById('confettiCanvas'),x=c.getContext('2d');
    function resize(){c.width=innerWidth;c.height=innerHeight;}window.addEventListener('resize',resize);resize();
    let confetti=[];
    const colors=['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#264653','#ffd700'];
    class Confetti{
        constructor(){this.reset(true);}
        reset(init){
            this.x=Math.random()*c.width;
            this.y=init?Math.random()*c.height:-10;
            this.s=Math.random()*4+2;
            this.vy=Math.random()*1+0.5;
            this.vx=Math.random()*0.6-0.3;
            this.a=Math.random()*0.7+0.3;
            this.r=Math.random()*360;
            this.vr=Math.random()*3-1.5;
            this.color=colors[Math.floor(Math.random()*colors.length)];
        }
        update(){
            this.y+=this.vy;this.x+=this.vx;this.r+=this.vr;
            if(this.y>c.height+10)this.reset(false);
        }
        draw(){
            x.save();x.translate(this.x,this.y);x.rotate(this.r*Math.PI/180);
            x.fillStyle=this.color;x.globalAlpha=this.a;
            x.fillRect(-this.s/2,-this.s/2,this.s,this.s*1.5);
            x.restore();x.globalAlpha=1;
        }
    }
    for(let i=0;i<60;i++)confetti.push(new Confetti());
    (function loop(){requestAnimationFrame(loop);x.clearRect(0,0,c.width,c.height);confetti.forEach(p=>{p.update();p.draw();});})();
</script>
</body>
</html>
