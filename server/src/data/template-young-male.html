<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      --bg1:#e8f4f8;--bg2:#d1e9f0;--bg3:#f0f9fb;
      --primary:#2a7a9b;--primary-light:#5ba3c0;--accent:#38bdf8;
      --text:#1a3a4a;--text-light:#4a7a8a;
      --card-bg:rgba(255,255,255,0.92);
      --shadow:0 8px 32px rgba(42,122,155,0.15);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(160deg,var(--bg3) 0%,var(--bg1) 50%,var(--bg2) 100%);
      overflow-y:auto;scroll-snap-type:y mandatory;
    }
    .page{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;scroll-snap-align:start}
    .page-one{gap:28px;}
    .header{text-align:center}
    .union-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:var(--card-bg);border-radius:24px;box-shadow:var(--shadow);font-size:14px;color:var(--primary);letter-spacing:2px;margin-bottom:24px}
    .union-badge::before{content:"◆";font-size:14px}
    .hero-visual{width:min(260px,65vw);height:min(260px,65vw);position:relative;display:grid;place-items:center}
    .geo-ring{position:absolute;border-radius:50%;border:2px solid var(--primary-light);opacity:0.2}
    .geo-ring:nth-child(1){inset:0;animation:spin 20s linear infinite}
    .geo-ring:nth-child(2){inset:15%;border-style:dashed;animation:spin 15s linear infinite reverse}
    .geo-ring:nth-child(3){inset:30%;border-color:var(--accent);opacity:0.15}
    .hero-icon{font-size:72px;filter:drop-shadow(0 4px 12px rgba(42,122,155,0.25));animation:float 3s ease-in-out infinite}
    .main-title{text-align:center}
    .recipient{font-size:clamp(36px,10vw,56px);font-weight:700;color:var(--primary);letter-spacing:8px;margin-bottom:12px}
    .greeting-line{font-size:clamp(18px,5vw,24px);color:var(--text-light);letter-spacing:4px;display:flex;align-items:center;gap:16px;justify-content:center}
    .greeting-line::before,.greeting-line::after{content:"";width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
    .sender-info{text-align:center;padding:20px 32px;background:var(--card-bg);border-radius:16px;box-shadow:var(--shadow)}
    .sender-label{font-size:13px;color:var(--text-light);letter-spacing:2px;margin-bottom:8px}
    .sender-name{font-size:18px;font-weight:500;color:var(--primary);letter-spacing:1px}
    .scroll-tip{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--text-light);letter-spacing:2px;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.7}
    .scroll-tip::after{content:"↓";font-size:16px;animation:bounce 1.5s infinite}
    .page-two{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
    .card-container{width:100%;max-width:400px;background:var(--card-bg);border-radius:20px;padding:40px 32px;box-shadow:var(--shadow);position:relative}
    .card-container::before{content:"";position:absolute;top:12px;left:12px;right:12px;bottom:12px;border:1px solid rgba(42,122,155,0.15);border-radius:12px;pointer-events:none}
    .card-header{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid rgba(42,122,155,0.1)}
    .card-title{font-size:20px;color:var(--primary);letter-spacing:6px;font-weight:500;margin-bottom:8px}
    .card-subtitle{font-size:12px;color:var(--text-light);letter-spacing:2px}
    .blessing-content{text-align:center;line-height:2.2;font-size:16px;color:var(--text);letter-spacing:1px;min-height:200px;display:flex;align-items:center;justify-content:center;white-space:pre-line}
    .card-footer{text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid rgba(42,122,155,0.1)}
    .signature{font-size:14px;color:var(--text-light);letter-spacing:2px}
    .date{font-size:12px;color:var(--primary-light);margin-top:8px;letter-spacing:1px}
    .deco-corner{position:absolute;width:30px;height:30px;border-color:var(--accent);opacity:0.3}
    .deco-corner.top-left{top:12px;left:12px;border-top:2px solid;border-left:2px solid;border-radius:4px 0 0 0}
    .deco-corner.top-right{top:12px;right:12px;border-top:2px solid;border-right:2px solid;border-radius:0 4px 0 0}
    .deco-corner.bottom-left{bottom:12px;left:12px;border-bottom:2px solid;border-left:2px solid;border-radius:0 0 0 4px}
    .deco-corner.bottom-right{bottom:12px;right:12px;border-bottom:2px solid;border-right:2px solid;border-radius:0 0 4px 0}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
    @media(max-width:400px){.page{padding:32px 20px}.card-container{padding:32px 24px}.recipient{letter-spacing:4px}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="header"><div class="union-badge">工会祝福</div></div>
    <div class="hero-visual">
      <div class="geo-ring"></div><div class="geo-ring"></div><div class="geo-ring"></div>
      <div class="hero-icon">🎂</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">来自</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip">向下查看祝福</div>
  </section>
  <section class="page page-two">
    <div class="card-container">
      <div class="deco-corner top-left"></div><div class="deco-corner top-right"></div>
      <div class="deco-corner bottom-left"></div><div class="deco-corner bottom-right"></div>
      <div class="card-header"><h2 class="card-title">生日祝福</h2><p class="card-subtitle">HAPPY BIRTHDAY</p></div>
      <div class="blessing-content">{{blessing}}</div>
      <div class="card-footer"><p class="signature">{{sender}} 敬上</p><p class="date">{{year}}年</p></div>
    </div>
  </section>
</body>
</html>
