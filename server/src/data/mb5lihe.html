<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日邀请函</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "Songti SC", "SimSun", serif; touch-action: none; }
    .swiper-container { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; transition: transform 0.6s ease-in-out; z-index: 10; }
    .page { min-height: 100vh; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: #9c7b56; }
    .bg-layer { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        z-index: 0; 
        background: url('https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/ee83ec25f2d9465981d7ad74cb00011c.jpg~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=202606051513265629F9186CF19FF619BF&rrcfp=dafada99&x-expires=2096867606&x-signature=uXWiDGcjzdxQqtnJQQdFetLREVo%3D') no-repeat center center;
        background-size: cover;
        opacity: 0.95;
    }
    /* 第二页独立背景图 */
    .page-2 .bg-layer {
        background: url('https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/e7020bf6c78048c4bf729330138ca791.jpg~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=2026060515351556A68F1BF1300217D501&rrcfp=dafada99&x-expires=2096868915&x-signature=7X8qI5hi%2F8nWTU4fczvggGO0MxY%3D') no-repeat center center;
        background-size: cover;
    }
    .page-1 .content { z-index: 10; text-align: center; margin-top: -50px; }
    .main-title-en { font-size: 4rem; font-weight: bold; line-height: 1; letter-spacing: 2px; color: #a88b65; }
    .date-text { font-size: 1rem; margin-top: 15px; color: #888; font-family: sans-serif; display:none; }
    .bottom-wish { position: absolute; bottom: 15%; width: 100%; text-align: center; z-index: 10; }
    .year-big { font-size: 3rem; font-weight: bold; color: #a88b65; line-height: 1; margin-bottom: 5px; font-family: sans-serif; }
    .wish-sub { font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 15px; color: #666; font-family: sans-serif; text-transform: uppercase;}
    .poem { font-size: 1.1rem; line-height: 1.8; color: #9c7b56; }
    .card-wrapper { z-index: 10; width: 85%; max-width: 400px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); padding: 40px 25px; box-shadow: 0 10px 30px rgba(168, 139, 101, 0.15); border: 1px solid rgba(255, 255, 255, 0.9); text-align: center; display: flex; flex-direction: column; align-items: center; }
    .card-header { margin-bottom: 20px; border-bottom: 1px dashed #d4af37; padding-bottom: 15px; width: 100%; }
    .nickname { font-size: 1.2rem; color: #a88b65; margin-bottom: 20px; font-weight: bold; }
    .card-body { text-align: left; font-size: 0.95rem; line-height: 1.8; color: #555; margin-bottom: 20px; text-indent: 2em; }
    .card-footer { border-top: 1px dashed #d4af37; padding-top: 15px; width: 100%; }
    .footer-wish { font-size: 0.9rem; color: #a88b65; font-weight: bold; margin-bottom: 5px; }
    .footer-poem { font-size: 0.8rem; color: #888; }
    .arrow-up { position: absolute; bottom: 20px; left: 50%; width: 24px; height: 24px; border-top: 2px solid #ccc; border-left: 2px solid #ccc; transform: translateX(-50%) rotate(45deg); animation: bounce 2s infinite; z-index: 20; cursor: pointer; }
    @keyframes bounce { 0%, 100% { transform: translateX(-50%) rotate(45deg) translateY(0); } 50% { transform: translateX(-50%) rotate(45deg) translateY(-10px); } }
    .music-icon { position: absolute; top: 20px; right: 20px; width: 30px; height: 30px; background: rgba(0,0,0,0.1); border-radius: 50%; z-index: 20; display: flex; align-items: center; justify-content: center; }
    .music-icon::after { content: '♪'; color: #a88b65; font-size: 18px; }
</style>
</head>
<body>

<div class="swiper-container" id="swiper">
    <!-- 第一页：封面（已删除文字） -->
    <div class="page page-1">
        <div class="bg-layer"></div>
        <div class="music-icon"></div>
        <div class="content">
            <!-- 已删除：生日快乐 -->
            <div class="date-text" id="coverDate">{{year}}</div>
        </div>
        <div class="bottom-wish">
            <div class="year-big" id="yearVal">{{year}}</div>
            <div class="wish-sub">BEST WISHES FOR YOU</div>
            <div class="poem">年年有今日 · 岁岁有今朝</div>
            <!-- 已删除：自由通透文案 -->
        </div>
        <div class="arrow-up" style="transform: translateX(-50%) rotate(-45deg);" onclick="nextPage()"></div>
    </div>

    <!-- 第二页：邀请函（新背景） -->
    <div class="page page-2">
        <div class="bg-layer"></div>
        <div class="music-icon"></div>
        <div class="card-wrapper">
            <div class="card-header">
                <div class="main-title-en" style="font-size: 2rem;">生日快乐</div>
            </div>
            <div class="nickname" id="userName">{{name}}</div>
            <!-- editable-start -->
            <div class="card-body" id="blessingText">{{blessing}}</div>
            <!-- editable-end -->
            <div class="card-footer">
                <div class="footer-wish">BEST WISHES FOR YOU</div>
                <div class="footer-poem" id="footerBless">{{blessing}}</div>
            </div>
        </div>
        <div class="arrow-up" onclick="prevPage()" style="transform: translateX(-50%) rotate(135deg); animation: none;"></div>
    </div>
</div>

<script>
const inviteData = {
    coverDate: "{{year}}", 
    userName: "{{name}}", 
    blessingText: "{{blessing}}"
};

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('yearVal').textContent = inviteData.coverDate;
    document.getElementById('userName').textContent = inviteData.userName;
    document.getElementById('blessingText').innerHTML = inviteData.blessing;
    document.getElementById('footerBless').innerText = inviteData.blessingText;
});

let currentPage = 0;
const totalPages = 2;
const swiper = document.getElementById('swiper');
function nextPage() { if (currentPage < totalPages - 1) { currentPage++; updateSlide(); } }
function prevPage() { if (currentPage > 0) { currentPage--; updateSlide(); } }
function updateSlide() { swiper.style.transform = `translateY(-${currentPage * 100}vh)`; }

let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].clientY; }, { passive: false });
document.addEventListener('touchend', e => {
    let touchEndY = e.changedTouches[0].clientY;
    let diff = touchStartY - touchEndY;
    if (diff > 50) { nextPage(); }
    else if (diff < -50) { prevPage(); }
});

document.addEventListener('wheel', e => {
    e.preventDefault();
    if (e.deltaY > 0) { nextPage(); } else { prevPage(); }
}, { passive: false });
</script>
</body>
</html>
