<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      /* 青年男性：青蓝科技 */
      --bg1:#f0f7ff;
      --bg2:#e8f2fc;
      --bg3:#f8fbff;
      --primary:#2c5aa0;
      --primary-light:#5a8fd4;
      --accent:#4ecdc4;
      --text:#3a4a5a;
      --text-light:#6a7a8a;
      --card-bg:rgba(255,255,255,0.96);
      --shadow:0 8px 32px rgba(44,90,160,0.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg3) 0%,var(--bg1) 40%,var(--bg2) 100%);
      overflow-y:auto;
      scroll-snap-type:y mandatory;
    }
    .page{
      min-height:100vh;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:40px 24px;
      scroll-snap-align:start;
    }

    /* 第一页 */
    .page-one{gap:36px}
    .header{text-align:center}
    .union-badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 26px;
      background:var(--card-bg);
      border-radius:8px;
      box-shadow:var(--shadow);
      font-size:14px;
      color:var(--primary);
      letter-spacing:3px;
      font-weight:500;
      border-left:4px solid var(--accent);
    }
    .union-badge::before{content:"◆";font-size:12px;color:var(--accent)}

    .hero-visual{
      width:min(200px,50vw);
      height:min(200px,50vw);
      position:relative;
      display:grid;
      place-items:center;
    }
    .hero-square{
      position:absolute;
      width:90%;
      height:90%;
      background:linear-gradient(135deg,var(--primary-light) 0%,var(--primary) 100%);
      opacity:0.08;
      border-radius:20px;
      transform:rotate(45deg);
      animation:rotate 8s linear infinite;
    }
    .hero-icon{
      font-size:64px;
      filter:drop-shadow(0 4px 12px rgba(44,90,160,0.2));
      animation:bounce 2s ease-in-out infinite;
      z-index:1;
    }

    .main-title{text-align:center}
    .recipient{
      font-size:clamp(44px,12vw,72px);
      font-weight:700;
      color:var(--primary);
      letter-spacing:8px;
      margin-bottom:16px;
      font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
    }
    .greeting-line{
      font-size:clamp(20px,5vw,26px);
      color:var(--text-light);
      letter-spacing:6px;
      display:flex;
      align-items:center;
      gap:20px;
      justify-content:center;
      font-weight:500;
    }
    .greeting-line::before,
    .greeting-line::after{
      content:"";
      width:36px;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
      border-radius:1px;
    }

    .sender-info{
      text-align:center;
      padding:24px 44px;
      background:var(--card-bg);
      border-radius:12px;
      box-shadow:var(--shadow);
      border-top:3px solid var(--accent);
    }
    .sender-label{
      font-size:12px;
      color:var(--text-light);
      letter-spacing:3px;
      margin-bottom:10px;
      text-transform:uppercase;
    }
    .sender-name{
      font-size:20px;
      font-weight:600;
      color:var(--primary);
      letter-spacing:3px;
    }

    .scroll-tip{
      position:absolute;
      bottom:28px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      opacity:0.7;
      animation:bounce 1.5s ease-in-out infinite;
    }
    .scroll-tip::before,
    .scroll-tip::after{
      content:"";
      display:block;
      width:12px;
      height:12px;
      border-right:2.5px solid var(--text-light);
      border-bottom:2.5px solid var(--text-light);
      transform:rotate(45deg);
    }
    .scroll-tip::before{opacity:.4}
    .scroll-tip::after{opacity:.8}

    /* 第二页 */
    .page-two{
      background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
      position:relative;
    }
    .page-two::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,transparent 49%,rgba(78,205,196,0.03) 50%,transparent 51%),
        linear-gradient(0deg,transparent 49%,rgba(78,205,196,0.03) 50%,transparent 51%);
      background-size:40px 40px;
      pointer-events:none;
    }
    .card-container{
      width:100%;
      max-width:400px;
      background:var(--card-bg);
      border-radius:16px;
      padding:40px 32px;
      box-shadow:var(--shadow);
      position:relative;
      border-top:4px solid var(--accent);
    }

    .card-header{
      text-align:center;
      margin-bottom:36px;
      padding-bottom:24px;
      border-bottom:2px solid rgba(44,90,160,0.08);
      position:relative;
    }
    .card-header::after{
      content:"";
      position:absolute;
      bottom:-2px;
      left:50%;
      transform:translateX(-50%);
      width:60px;
      height:2px;
      background:var(--accent);
    }
    .card-title{
      font-size:22px;
      color:var(--primary);
      letter-spacing:8px;
      font-weight:700;
      margin-bottom:8px;
    }
    .card-subtitle{
      font-size:11px;
      color:var(--text-light);
      letter-spacing:4px;
      text-transform:uppercase;
      font-weight:500;
    }

    .blessing-content{
      text-align:center;
      line-height:2.4;
      font-size:16px;
      color:var(--text);
      letter-spacing:1px;
      min-height:160px;
      display:flex;
      align-items:center;
      justify-content:center;
      white-space:pre-line;
      font-weight:400;
    }

    .card-footer{
      text-align:center;
      margin-top:36px;
      padding-top:24px;
      border-top:1px solid rgba(44,90,160,0.08);
    }
    .signature{
      font-size:15px;
      color:var(--text-light);
      letter-spacing:3px;
      margin-bottom:6px;
      font-weight:500;
    }
    .date{
      font-size:13px;
      color:var(--primary-light);
      letter-spacing:2px;
    }

    .deco-geo{
      position:absolute;
      opacity:0.08;
      animation:pulse 3s ease-in-out infinite;
    }
    .deco-geo.g1{
      width:60px;height:60px;
      border:3px solid var(--primary);
      top:50px;left:30px;
      transform:rotate(15deg);
    }
    .deco-geo.g2{
      width:40px;height:40px;
      background:var(--accent);
      top:120px;right:40px;
      transform:rotate(45deg);
      animation-delay:0.5s;
    }
    .deco-geo.g3{
      width:50px;height:50px;
      border:2px solid var(--primary-light);
      border-radius:50%;
      bottom:100px;left:35px;
      animation-delay:1s;
    }

    @keyframes pulse{
      0%,100%{opacity:0.08;transform:scale(1) rotate(var(--r,0deg))}
      50%{opacity:0.12;transform:scale(1.05) rotate(var(--r,0deg))}
    }
    @keyframes rotate{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }
    @keyframes bounce{
      0%,100%{transform:translateX(-50%) translateY(0)}
      50%{transform:translateX(-50%) translateY(6px)}
    }

    @media (max-width:400px){
      .page{padding:32px 20px}
      .card-container{padding:32px 24px}
      .recipient{letter-spacing:5px}
      .greeting-line{letter-spacing:4px}
      .deco-geo{display:none}
    }
    @media (prefers-reduced-motion:reduce){*{animation:none !important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="header">
      <div class="union-badge">工会祝福</div>
    </div>
    <div class="hero-visual">
      <div class="hero-square"></div>
      <div class="hero-icon">🎂</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">From</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip" aria-label="向下滑动"></div>
  </section>

  <section class="page page-two">
    <div class="deco-geo g1"></div>
    <div class="deco-geo g2"></div>
    <div class="deco-geo g3"></div>
    <div class="card-container">
      <div class="card-header">
        <h2 class="card-title">生日祝福</h2>
        <p class="card-subtitle">Happy Birthday</p>
      </div>
      <!-- editable-start -->
      <div class="blessing-content">{{blessing}}</div>
      <!-- editable-end -->
      <div class="card-footer">
        <p class="signature">{{sender}} 敬上</p>
        <p class="date">{{year}}年</p>
      </div>
    </div>
  </section>
</body>
</html>
