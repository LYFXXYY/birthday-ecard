<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日邀请函-赛博</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "Arial Black", sans-serif; background: #0a0a12; touch-action: none; }
    canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .swiper-container { width: 100%; height: 100%; display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.22,1,0.36,1); z-index: 10; }
    .page { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
    
    .neon-title { font-size: 3.2rem; text-transform: uppercase; letter-spacing: 3px; text-align: center; line-height: 1.1;
        background: linear-gradient(135deg,#ff00cc,#3333ff,#00ffcc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(255,0,204,0.5)); }
    .sub-text { font-size: 1rem; margin-top: 15px; color: #00ffcc; letter-spacing: 6px; text-shadow: 0 0 8px rgba(0,255,204,0.6); }
    .date-text { font-size: 0.85rem; margin-top: 20px; color: rgba(255,255,255,0.6); font-family: monospace; letter-spacing: 2px; }
    
    .cyber-card { z-index:10; width:85%; max-width:400px; background:rgba(255,255,255,0.05); backdrop-filter:blur(10px);
        border:1px solid rgba(0,255,204,0.3); border-radius:12px; padding:35px 25px; text-align:center;
        box-shadow:0 0 20px rgba(0,255,204,0.1), inset 0 0 20px rgba(255,0,204,0.05); }
    .nickname { font-size:1.4rem; color:#ff00cc; text-shadow:0 0 10px rgba(255,0,204,0.5); margin-bottom:20px; letter-spacing:2px; }
    .department { font-size:0.75rem; color:#00ffcc; margin-bottom:15px; letter-spacing:2px; opacity:0.8; }
    .blessing { text-align:left; font-size:0.9rem; line-height:2; color:rgba(255,255,255,0.85); text-indent:2em; margin-bottom:25px; font-family:"PingFang SC",sans-serif; }
    .footer-wish { font-size:0.8rem; color:#00ffcc; letter-spacing:3px; border-top:1px solid rgba(0,255,204,0.2); padding-top:15px; text-shadow:0 0 5px rgba(0,255,204,0.4); }
    
    .arrow { position:absolute; bottom:30px; left:50%; width:24px; height:24px; border-right:2px solid #00ffcc; border-bottom:2px solid #00ffcc;
        transform:translateX(-50%) rotate(45deg); animation:bounce 2s infinite; cursor:pointer; z-index:20; box-shadow:3px 3px 8px rgba(0,255,204,0.3); }
    @keyframes bounce { 0%,100%{transform:translateX(-50%) rotate(45deg) translateY(0)} 50%{transform:translateX(-50%) rotate(45deg) translateY(-10px)} }
</style>
</head>
<body>
<canvas id="gridCanvas"></canvas>
<div class="swiper-container" id="swiper">
    <div class="page">
        <div class="neon-title">HAPPY<br>BIRTHDAY</div>
        <div class="sub-text">生日快乐</div>
        <!-- 年份占位符 -->
        <div class="date-text">{{year}}</div>
        <div style="position:absolute;bottom:18%;text-align:center;z-index:10;font-size:0.85rem;color:rgba(255,255,255,0.5);line-height:1.8;letter-spacing:1px;">
            LEVEL UP · 解锁新一岁<br>愿你的未来如霓虹般璀璨
        </div>
        <div class="arrow" onclick="nextPage()" style="transform:translateX(-50%) rotate(-45deg);"></div>
    </div>
    <div class="page">
        <div class="cyber-card">
            <!-- 姓名占位符 -->
            <div class="nickname">{{name}}</div>
            <!-- 部门占位符 -->
            <div class="department">{{department}}</div>
            <!-- 祝福语占位符 -->
            <!-- editable-start -->
            <div class="blessing">{{blessing}}</div>
            <!-- editable-end -->
            <div class="footer-wish">LEVEL UP · BEST WISHES</div>
        </div>
        <div class="arrow" onclick="prevPage()" style="transform:translateX(-50%) rotate(135deg);animation:none;"></div>
    </div>
</div>
<script>
    // === 翻页逻辑 (通用) ===
    let currentPage=0;const swiper=document.getElementById('swiper');
    function nextPage(){if(currentPage<1){currentPage++;updateSlide();}}
    function prevPage(){if(currentPage>0){currentPage--;updateSlide();}}
    function updateSlide(){swiper.style.transform=`translateY(-${currentPage*100}vh)`;}
    let tSY=0;document.addEventListener('touchstart',e=>{tSY=e.touches[0].clientY},{passive:false});
    document.addEventListener('touchend',e=>{let d=tSY-e.changedTouches[0].clientY;if(d>50)nextPage();else if(d<-50)prevPage();});
    document.addEventListener('wheel',e=>{e.preventDefault();if(e.deltaY>0)nextPage();else prevPage();},{passive:false});

    // === 赛博网格+闪烁光点特效 ===
    const c=document.getElementById('gridCanvas'),x=c.getContext('2d');
    function resize(){c.width=innerWidth;c.height=innerHeight;}window.addEventListener('resize',resize);resize();
    let sparks=[];
    class Spark{constructor(){this.reset();}reset(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.s=Math.random()*2+0.5;this.a=1;this.d=Math.random()*0.02+0.01;this.color=Math.random()>0.5?'#ff00cc':'#00ffcc';}update(){this.a-=this.d;if(this.a<=0)this.reset();}draw(){x.beginPath();x.arc(this.x,this.y,this.s,0,Math.PI*2);x.fillStyle=this.color;x.globalAlpha=this.a;x.fill();x.globalAlpha=1;}}
    for(let i=0;i<40;i++)sparks.push(new Spark());
    (function loop(){requestAnimationFrame(loop);x.clearRect(0,0,c.width,c.height);
        // 绘制动态网格
        x.strokeStyle='rgba(0,255,204,0.06)';x.lineWidth=1;
        let offset=(Date.now()/50)%40;
        for(let i=offset;i<c.width;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke();}
        for(let i=offset;i<c.height;i+=40){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke();}
        sparks.forEach(s=>{s.update();s.draw();});
    })();
</script>
</body>
</html>
