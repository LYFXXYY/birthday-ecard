<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      --bg1:#f5eef8;--bg2:#e8ddf0;--bg3:#faf5fc;
      --primary:#7c4a8a;--primary-light:#a878b8;--accent:#c9965a;
      --text:#3d2e45;--text-light:#6d5a78;
      --card-bg:rgba(255,255,255,0.95);
      --shadow:0 8px 32px rgba(124,74,138,0.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(170deg,var(--bg3) 0%,var(--bg1) 50%,var(--bg2) 100%);
      overflow-y:auto;scroll-snap-type:y mandatory;
    }
    .page{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;scroll-snap-align:start}
    .page-one{gap:30px;}
    .header{text-align:center}
    .union-badge{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 24px;background:var(--primary);color:#fff;
      border-radius:30px;font-size:13px;letter-spacing:3px;margin-bottom:28px;
    }
    .union-badge::before{content:"✦";font-size:12px}

    /* 主视觉 - 丝带环绕 */
    .hero-visual{
      width:min(260px,65vw);height:min(260px,65vw);
      position:relative;display:grid;place-items:center;
    }
    .ribbon-ring{
      position:absolute;border-radius:50%;
    }
    .ribbon-ring:nth-child(1){
      inset:5%;border:3px solid var(--primary-light);opacity:0.15;
      animation:pulse 4s ease-in-out infinite;
    }
    .ribbon-ring:nth-child(2){
      inset:20%;border:2px solid var(--accent);opacity:0.2;
      animation:pulse 4s ease-in-out infinite 1s;
    }
    .ribbon-ring:nth-child(3){
      inset:35%;border:1px solid var(--primary);opacity:0.25;
      border-radius:40% 60% 55% 45%;
      animation:float 5s ease-in-out infinite;
    }
    .hero-icon{
      font-size:68px;filter:drop-shadow(0 4px 12px rgba(124,74,138,0.2));
      animation:float 3s ease-in-out infinite;
    }

    /* 主标题 - 优雅字体 */
    .main-title{text-align:center}
    .recipient{
      font-size:clamp(34px,9vw,54px);font-weight:500;
      color:var(--primary);letter-spacing:8px;margin-bottom:14px;
      font-family:Georgia,"Times New Roman",serif;
    }
    .greeting-line{
      font-size:clamp(16px,4vw,22px);color:var(--text-light);
      letter-spacing:5px;display:flex;align-items:center;gap:16px;justify-content:center;
    }
    .greeting-line::before,.greeting-line::after{
      content:"";width:44px;height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
    }

    /* 发送者 */
    .sender-info{
      text-align:center;padding:20px 36px;
      background:var(--card-bg);border-radius:4px;box-shadow:var(--shadow);
      border-bottom:3px solid var(--accent);
    }
    .sender-label{font-size:12px;color:var(--text-light);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
    .sender-name{font-size:17px;font-weight:500;color:var(--primary);letter-spacing:2px}

    .scroll-tip{
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      font-size:12px;color:var(--text-light);letter-spacing:2px;
      display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.6;
    }
    .scroll-tip::after{content:"↓";font-size:16px;animation:bounce 1.5s infinite}

    /* 第二页 - 祝福 */
    .page-two{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
    .card-container{
      width:100%;max-width:400px;background:var(--card-bg);
      border-radius:4px;padding:44px 36px;box-shadow:var(--shadow);position:relative;
      border-top:4px solid var(--primary);
    }
    .card-ornament{
      position:absolute;width:36px;height:36px;
      color:var(--accent);opacity:0.25;font-size:28px;
      display:grid;place-items:center;
    }
    .card-ornament.tl{top:12px;left:12px}
    .card-ornament.tr{top:12px;right:12px;transform:scaleX(-1)}
    .card-ornament.bl{bottom:12px;left:12px;transform:scaleY(-1)}
    .card-ornament.br{bottom:12px;right:12px;transform:scale(-1,-1)}

    .card-header{
      text-align:center;margin-bottom:28px;padding-bottom:20px;
      border-bottom:1px solid rgba(124,74,138,0.1);
    }
    .card-title{font-size:18px;color:var(--primary);letter-spacing:8px;font-weight:500;margin-bottom:6px}
    .card-subtitle{font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase}

    .blessing-content{
      text-align:center;line-height:2.2;font-size:15px;color:var(--text);
      letter-spacing:1px;min-height:200px;display:flex;align-items:center;
      justify-content:center;white-space:pre-line;
    }

    .card-footer{
      text-align:center;margin-top:28px;padding-top:20px;
      border-top:1px solid rgba(124,74,138,0.1);
    }
    .signature{font-size:14px;color:var(--text-light);letter-spacing:2px}
    .date{font-size:12px;color:var(--accent);margin-top:6px;letter-spacing:1px}

    @keyframes pulse{0%,100%{transform:scale(1);opacity:0.15}50%{transform:scale(1.05);opacity:0.25}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

    @media(max-width:400px){.page{padding:32px 20px}.card-container{padding:36px 24px}.recipient{letter-spacing:5px}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="header"><div class="union-badge">工会祝福</div></div>
    <div class="hero-visual">
      <div class="ribbon-ring"></div><div class="ribbon-ring"></div><div class="ribbon-ring"></div>
      <div class="hero-icon">🎂</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">来自</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip">向下查看祝福</div>
  </section>
  <section class="page page-two">
    <div class="card-container">
      <div class="card-ornament tl">❋</div><div class="card-ornament tr">❋</div>
      <div class="card-ornament bl">❋</div><div class="card-ornament br">❋</div>
      <div class="card-header"><h2 class="card-title">生日祝福</h2><p class="card-subtitle">HAPPY BIRTHDAY</p></div>
      <div class="blessing-content">{{blessing}}</div>
      <div class="card-footer"><p class="signature">{{sender}} 敬上</p><p class="date">{{year}}年</p></div>
    </div>
  </section>
</body>
</html>
