<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      --bg1:#eef1f5;--bg2:#dde3ec;--bg3:#f5f7fa;
      --primary:#2c3e6b;--primary-light:#4a6090;--accent:#c9a84c;
      --text:#1e293b;--text-light:#5a6577;
      --card-bg:rgba(255,255,255,0.95);
      --shadow:0 8px 32px rgba(44,62,107,0.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg3) 0%,var(--bg1) 60%,var(--bg2) 100%);
      overflow-y:auto;scroll-snap-type:y mandatory;
    }
    .page{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;scroll-snap-align:start}
    .page-one{gap:28px;}
    .header{text-align:center}
    .union-badge{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 24px;background:var(--primary);color:#fff;
      border-radius:4px;font-size:13px;letter-spacing:3px;margin-bottom:28px;font-weight:500;
    }
    .hero-visual{
      width:min(300px,75vw);position:relative;
      display:grid;place-items:center;padding:20px 0;
    }
    .mountain-svg{width:100%;height:auto;opacity:0.08}
    .hero-icon{
      position:absolute;font-size:64px;
      filter:drop-shadow(0 4px 12px rgba(44,62,107,0.2));
      animation:float 4s ease-in-out infinite;
    }
    .main-title{text-align:center}
    .recipient{
      font-size:clamp(34px,9vw,52px);font-weight:600;
      color:var(--primary);letter-spacing:10px;margin-bottom:14px;
      font-family:Georgia,"Times New Roman",serif;
    }
    .greeting-line{
      font-size:clamp(16px,4vw,22px);color:var(--text-light);
      letter-spacing:6px;display:flex;align-items:center;gap:16px;justify-content:center;
    }
    .greeting-line::before,.greeting-line::after{
      content:"";width:50px;height:1px;background:var(--accent);
    }
    .sender-info{
      text-align:center;padding:18px 36px;
      background:var(--card-bg);border-radius:4px;box-shadow:var(--shadow);
      border-top:3px solid var(--accent);
    }
    .sender-label{font-size:12px;color:var(--text-light);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
    .sender-name{font-size:17px;font-weight:500;color:var(--primary);letter-spacing:1px}
    .scroll-tip{
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      font-size:12px;color:var(--text-light);letter-spacing:2px;
      display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.6;
    }
    .scroll-tip::after{content:"↓";font-size:16px;animation:bounce 1.5s infinite}
    .page-two{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
    .card-container{
      width:100%;max-width:400px;background:var(--card-bg);
      border-radius:4px;padding:44px 36px;box-shadow:var(--shadow);position:relative;
      border-top:4px solid var(--primary);
    }
    .card-header{
      text-align:center;margin-bottom:28px;padding-bottom:20px;
      border-bottom:1px solid rgba(44,62,107,0.1);
    }
    .card-title{font-size:18px;color:var(--primary);letter-spacing:8px;font-weight:600;margin-bottom:6px}
    .card-subtitle{font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
    .blessing-content{
      text-align:justify;line-height:2.2;font-size:15px;color:var(--text);
      letter-spacing:1px;min-height:200px;white-space:pre-line;text-align-last:center;
    }
    .card-footer{
      text-align:center;margin-top:28px;padding-top:20px;
      border-top:1px solid rgba(44,62,107,0.1);
    }
    .signature{font-size:14px;color:var(--text-light);letter-spacing:2px}
    .date{font-size:12px;color:var(--accent);margin-top:6px;letter-spacing:1px}
    .deco-line{position:absolute;width:20px;height:1px;background:var(--accent);opacity:0.4}
    .deco-line.top-left{top:20px;left:20px}
    .deco-line.top-right{top:20px;right:20px}
    .deco-line.bottom-left{bottom:20px;left:20px}
    .deco-line.bottom-right{bottom:20px;right:20px}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
    @media(max-width:400px){.page{padding:32px 20px}.card-container{padding:36px 24px}.recipient{letter-spacing:6px}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="header"><div class="union-badge">工会祝福</div></div>
    <div class="hero-visual">
      <svg class="mountain-svg" viewBox="0 0 400 160" aria-hidden="true">
        <path d="M0,160 L80,60 L160,120 L240,30 L320,100 L400,50 L400,160 Z" fill="currentColor"/>
      </svg>
      <div class="hero-icon">🎂</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">来自</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip">向下查看祝福</div>
  </section>
  <section class="page page-two">
    <div class="card-container">
      <div class="deco-line top-left"></div><div class="deco-line top-right"></div>
      <div class="deco-line bottom-left"></div><div class="deco-line bottom-right"></div>
      <div class="card-header"><h2 class="card-title">生日祝福</h2><p class="card-subtitle">HAPPY BIRTHDAY</p></div>
      <!-- editable-start -->
      <div class="blessing-content">{{blessing}}</div>
      <!-- editable-end -->
      <div class="card-footer"><p class="signature">{{sender}} 敬上</p><p class="date">{{year}}年</p></div>
    </div>
  </section>
</body>
</html>
