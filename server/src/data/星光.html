<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌟 璀璨星光 · 生日贺卡</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "PingFang SC","Microsoft YaHei", sans-serif; background: #0f0c29; touch-action: none; color: #fff; }

    #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .swiper-container { width: 100%; height: 100%; position: relative; z-index: 10; display: flex; flex-direction: column; transition: transform 0.85s cubic-bezier(0.22,1,0.36,1); }
    .page { min-height: 100vh; width: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 24px; }

    /* 星空背景页 */
    .page-1 { background: radial-gradient(ellipse at 50% 50%, #1a1a4e 0%, #0f0c29 50%, #050510 100%); }
    .page-4 { background: radial-gradient(ellipse at 50% 50%, #1a1a4e 0%, #0f0c29 50%, #050510 100%); }

    /* 中央星星 */
    .star-scene { position: relative; z-index: 5; width: min(65vw, 300px); height: min(65vw, 300px); display: grid; place-items: center; }
    .big-star {
        font-size: clamp(60px, 18vw, 100px);
        animation: starPulse 3s ease-in-out infinite;
        filter: drop-shadow(0 0 40px rgba(255,215,0,0.4)) drop-shadow(0 0 80px rgba(255,215,0,0.15));
    }
    @keyframes starPulse {
        0%, 100% { transform: scale(1) rotate(0deg); }
        25% { transform: scale(1.08) rotate(5deg); }
        50% { transform: scale(1) rotate(0deg); }
        75% { transform: scale(1.05) rotate(-5deg); }
    }
    .star-glow {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        border-radius: 50%; border: 1px solid rgba(255,215,0,0.1);
        animation: starGlowExpand var(--dur, 4s) var(--delay, 0s) ease-out infinite;
    }
    @keyframes starGlowExpand {
        0% { width: 10%; height: 10%; opacity: 0.8; }
        100% { width: 90%; height: 90%; opacity: 0; }
    }
    .star-orbit {
        position: absolute; width: 100%; height: 100%;
        animation: starOrbit var(--dur, 8s) linear infinite;
    }
    @keyframes starOrbit { to { transform: rotate(360deg); } }
    .star-orbit-dot {
        position: absolute; width: 8px; height: 8px; border-radius: 50%;
        background: #ffd54f; box-shadow: 0 0 10px rgba(255,213,79,0.6);
    }

    /* 卡片 - 暗色玻璃 */
    .info-card, .bless-card {
        width: 88%; max-width: 420px; position: relative; z-index: 5;
        background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
        border: 1px solid rgba(255,215,0,0.15); border-radius: 24px;
        padding: 38px 28px; text-align: center;
        box-shadow: 0 16px 50px rgba(0,0,0,0.15); max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .info-card { animation: cardSlideUp 0.9s cubic-bezier(0.16,1,0.3,1) both; }
    .bless-card { animation: cardSlideUp 0.9s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes cardSlideUp { 0%{opacity:0;transform:translateY(50px)} 100%{opacity:1;transform:translateY(0)} }

    .card-label { font-size: 11px; color: #ffd54f; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 8px; }
    .card-name { font-size: clamp(26px,7vw,38px); font-weight: 700; color: #ffd54f; letter-spacing: 4px; margin-bottom: 6px; }
    .card-dept { font-size: clamp(12px,2.5vw,15px); color: rgba(255,213,79,0.6); letter-spacing: 2px; margin-bottom: 22px; }
    .card-divider { width: 50px; height: 2px; margin: 0 auto 22px; background: linear-gradient(90deg, transparent, #ffd54f, transparent); }
    .card-details { display: flex; flex-direction: column; gap: 10px; }
    .card-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: clamp(13px,3vw,15px); color: rgba(255,255,255,0.7); padding: 8px 14px; border-radius: 10px; background: rgba(255,215,79,0.04); border: 1px solid rgba(255,215,79,0.06); }
    .card-row .icon { font-size: 16px; }

    .bless-title { font-size: clamp(18px,4.5vw,24px); font-weight: 600; color: #ffd54f; letter-spacing: 3px; margin-bottom: 22px; }
    .bless-text { text-align: left; font-size: clamp(14px,3.2vw,16px); line-height: 1.9; color: rgba(255,255,255,0.8); text-indent: 2em; white-space: pre-wrap; margin-bottom: 24px; }
    .bless-footer { border-top: 1px dashed rgba(255,215,79,0.15); padding-top: 16px; display: flex; flex-direction: column; gap: 4px; }
    .bless-sign { font-size: 14px; color: rgba(255,213,79,0.7); letter-spacing: 2px; }
    .bless-date { font-size: 12px; color: rgba(255,213,79,0.4); letter-spacing: 1px; }

    /* 入场动画 */
    .anim-item { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .anim-item.visible { opacity: 1; transform: translateY(0); }
    .anim-d1 { transition-delay: 0.1s; }
    .anim-d2 { transition-delay: 0.2s; }
    .anim-d3 { transition-delay: 0.3s; }
    .anim-d4 { transition-delay: 0.4s; }
    .anim-d5 { transition-delay: 0.5s; }
    .anim-d6 { transition-delay: 0.6s; }

    /* 尾封 - 大星星 + 光晕 */
    .back-star-scene { position: relative; z-index: 5; width: min(60vw, 280px); height: min(60vw, 280px); display: grid; place-items: center; }
    .back-star-orbit { position: absolute; width: 100%; height: 100%; animation: starOrbit 10s linear infinite; }
    .back-star-orbit:nth-child(2) { animation-duration: 15s; animation-direction: reverse; }

    .arrow { position: absolute; bottom: 26px; left: 50%; width: 22px; height: 22px; border-right: 2.5px solid rgba(255,215,79,0.4); border-bottom: 2.5px solid rgba(255,215,79,0.4); transform: translateX(-50%) rotate(45deg); animation: arrowBounce 1.8s ease-in-out infinite; cursor: pointer; z-index: 20; opacity: 0.5; }
    @keyframes arrowBounce { 0%,100%{transform:translateX(-50%) rotate(45deg) translateY(0);opacity:0.3} 50%{transform:translateX(-50%) rotate(45deg) translateY(-10px);opacity:0.7} }

    .page-dots { position: fixed; right: 14px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 50; }
    .page-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,215,79,0.15); transition: all 0.4s; }
    .page-dot.active { background: #ffd54f; box-shadow: 0 0 8px rgba(255,213,79,0.4); transform: scale(1.4); }

    .music-btn { position: fixed; top: 16px; right: 16px; z-index: 100; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,79,0.15); display: grid; place-items: center; cursor: pointer; font-size: 17px; color: #ffd54f; transition: all 0.3s; }
    .music-btn.playing { animation: musicSpin 3s linear infinite; }
    @keyframes musicSpin { to { transform: rotate(360deg); } }

    .particle-burst { position: absolute; pointer-events: none; z-index: 5; }
    .burst-dot { position: absolute; border-radius: 50%; opacity: 0; animation: burstFly var(--bdur,1s) var(--bdelay,0s) ease-out forwards; }
    @keyframes burstFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--bx,50px),var(--by,-60px)) scale(0);opacity:0} }

    @media(max-width:420px){.info-card,.bless-card{padding:30px 20px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="page-dots" id="pageDots"><div class="page-dot active"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div></div>

<div class="swiper-container" id="swiper">
    <!-- 第1页：封面 - 大星星 -->
    <div class="page page-1" id="page1">
        <div class="star-scene">
            <div class="star-glow" style="--dur:3s;--delay:0s;"></div>
            <div class="star-glow" style="--dur:4s;--delay:1.3s;"></div>
            <div class="star-glow" style="--dur:5s;--delay:2.6s;"></div>
            <div class="star-orbit" style="--dur:8s;"><div class="star-orbit-dot" style="top:-4px;left:50%;transform:translateX(-50%);"></div></div>
            <div class="star-orbit" style="--dur:12s;animation-direction:reverse;"><div class="star-orbit-dot" style="bottom:-4px;left:50%;transform:translateX(-50%);background:#81d4fa;box-shadow:0 0 10px rgba(129,212,250,0.6);"></div></div>
            <div class="star-orbit" style="--dur:16s;"><div class="star-orbit-dot" style="top:50%;right:-4px;transform:translateY(-50%);background:#ce93d8;box-shadow:0 0 10px rgba(206,147,216,0.6);"></div></div>
            <span class="big-star">⭐</span>
        </div>
        <div class="arrow" onclick="nextPage()"></div>
    </div>

    <!-- 第2页：员工信息 -->
    <div class="page page-2" id="page2" style="background:radial-gradient(ellipse at 50% 40%, #1a237e 0%, #0f0c29 60%, #050510 100%)">
        <div class="info-card">
            <div class="card-label anim-item anim-d1">HAPPY BIRTHDAY</div>
            <div class="card-name anim-item anim-d2">{{name}}</div>
            <div class="card-dept anim-item anim-d3">{{department}} · {{position}}</div>
            <div class="card-divider anim-item anim-d4"></div>
            <div class="card-details">
                <div class="card-row anim-item anim-d4"><span class="icon">🎂</span> 生日：{{birthday}}</div>
            </div>
        </div>
        <div class="arrow" onclick="nextPage()"></div>
    </div>

    <!-- 第3页：祝福语 -->
    <div class="page page-3" id="page3" style="background:radial-gradient(ellipse at 50% 60%, #1a237e 0%, #0f0c29 60%, #050510 100%)">
        <div class="bless-card">
            <div class="card-label anim-item anim-d1">BIRTHDAY WISHES</div>
            <div class="bless-title anim-item anim-d2">生日祝福</div>
            <!-- editable-start -->
            <div class="bless-text anim-item anim-d3">{{blessing}}</div>
            <!-- editable-end -->
            <div class="bless-footer">
                <div class="bless-sign anim-item anim-d4">{{sender}} 敬上</div>
                <div class="bless-date anim-item anim-d5">{{year}}年{{month}}月{{day}}日</div>
            </div>
        </div>
        <div class="arrow" onclick="nextPage()"></div>
    </div>

    <!-- 第4页：尾封 - 大星星 -->
    <div class="page page-4" id="page4">
        <div class="back-star-scene">
            <div class="star-glow" style="border-color:rgba(255,215,79,0.12);--dur:3.5s;--delay:0s;"></div>
            <div class="star-glow" style="border-color:rgba(255,215,79,0.08);--dur:4.5s;--delay:1.5s;"></div>
            <div class="star-glow" style="border-color:rgba(255,215,79,0.04);--dur:5.5s;--delay:3s;"></div>
            <div class="back-star-orbit" style="--dur:10s;"><div class="star-orbit-dot" style="top:-4px;left:50%;"></div></div>
            <div class="back-star-orbit" style="--dur:14s;animation-direction:reverse;"><div class="star-orbit-dot" style="bottom:-4px;left:50%;background:#81d4fa;box-shadow:0 0 10px rgba(129,212,250,0.6);"></div></div>
            <span class="big-star" style="font-size:clamp(50px,15vw,85px);">🌟</span>
        </div>
        <div class="arrow" onclick="prevPage()" style="transform:translateX(-50%) rotate(135deg);animation:none;"></div>
    </div>
</div>
<button class="music-btn" id="musicBtn">🎵</button>

<script>
let currentPage=0;const totalPages=4;const swiper=document.getElementById('swiper');const dots=document.querySelectorAll('.page-dot');
function updateSlide(){swiper.style.transform=`translateY(-${currentPage*100}vh)`;dots.forEach((d,i)=>d.classList.toggle('active',i===currentPage));triggerAnim(currentPage)}
function nextPage(){if(currentPage<totalPages-1){currentPage++;updateSlide();burstPage()}}
function prevPage(){if(currentPage>0){currentPage--;updateSlide()}}
let tSY=0;document.addEventListener('touchstart',e=>{tSY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{const d=tSY-e.changedTouches[0].clientY;if(d>45)nextPage();else if(d<-45)prevPage()});
let wheelLock=false;document.addEventListener('wheel',e=>{e.preventDefault();if(wheelLock)return;wheelLock=true;if(e.deltaY>0)nextPage();else prevPage();setTimeout(()=>wheelLock=false,850)},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();nextPage()}if(e.key==='ArrowUp'){e.preventDefault();prevPage()}});

function triggerAnim(idx){const el=document.getElementById('page'+(idx+1));if(!el)return;const items=el.querySelectorAll('.anim-item');items.forEach(i=>i.classList.remove('visible'));void el.offsetWidth;items.forEach(i=>setTimeout(()=>i.classList.add('visible'),80))}

// Canvas 深空星空
(function(){const c=document.getElementById('bgCanvas');const ctx=c.getContext('2d');let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight}window.addEventListener('resize',resize);resize();
const stars=[];for(let i=0;i<150;i++){stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+0.2,twinkle:Math.random()*Math.PI*2,speed:Math.random()*0.15+0.02,hue:Math.random()*60+30})}
const shootingStars=[];
class ShootingStar{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H*0.5;this.len=Math.random()*80+40;this.speed=Math.random()*8+5;this.angle=Math.PI/4+(Math.random()-0.5)*0.4;this.alpha=1;this.alive=true}update(){this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.alpha-=0.012;if(this.alpha<=0||this.x>W+50||this.y>H+50)this.alive=false}draw(){const ex=this.x-Math.cos(this.angle)*this.len;const ey=this.y-Math.sin(this.angle)*this.len;const g=ctx.createLinearGradient(this.x,this.y,ex,ey);g.addColorStop(0,`rgba(255,215,79,${this.alpha})`);g.addColorStop(1,`rgba(255,215,79,0)`);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(ex,ey);ctx.stroke()}}
let sTimer=0;
function loop(){requestAnimationFrame(loop);ctx.fillStyle='rgba(15,12,41,0.12)';ctx.fillRect(0,0,W,H);
stars.forEach(s=>{s.twinkle+=0.015;const a=0.15+Math.sin(s.twinkle)*0.4;ctx.fillStyle=`hsla(${s.hue},60%,70%,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();s.y-=s.speed;if(s.y<-5){s.y=H+5;s.x=Math.random()*W}});
sTimer++;if(sTimer%150===0)shootingStars.push(new ShootingStar());
for(let i=shootingStars.length-1;i>=0;i--){shootingStars[i].update();shootingStars[i].draw();if(!shootingStars[i].alive)shootingStars.splice(i,1)}
}loop()})();

function burstPage(){const el=document.getElementById('page'+(currentPage+1));if(!el)return;const b=document.createElement('div');b.className='particle-burst';b.style.left='50%';b.style.top='50%';const cs=['#ffd54f','#81d4fa','#ce93d8','#ffab91','#a5d6a7'];for(let i=0;i<24;i++){const d=document.createElement('div');d.className='burst-dot';const a=(Math.PI*2/24)*i,dist=40+Math.random()*80;d.style.cssText=`width:5px;height:5px;background:${cs[Math.floor(Math.random()*cs.length)]};--bx:${Math.cos(a)*dist}px;--by:${Math.sin(a)*dist}px;--bdur:${0.5+Math.random()*0.6}s;--bdelay:${Math.random()*0.12}s;`;b.appendChild(d)}el.appendChild(b);setTimeout(()=>b.remove(),1800)}

document.addEventListener('click',function(e){if(e.target.closest('.music-btn')||e.target.closest('.arrow')||e.target.closest('.page-dot'))return;const cx=e.clientX,cy=e.clientY;const el=document.getElementById('page'+(currentPage+1));const b=document.createElement('div');b.className='particle-burst';b.style.left=cx+'px';b.style.top=cy+'px';const cs=['#ffd54f','#81d4fa','#ce93d8','#ffab91','#a5d6a7'];for(let i=0;i<14;i++){const d=document.createElement('div');d.className='burst-dot';const a=(Math.PI*2/14)*i,dist=20+Math.random()*50;d.style.cssText=`width:4px;height:4px;background:${cs[Math.floor(Math.random()*cs.length)]};--bx:${Math.cos(a)*dist}px;--by:${Math.sin(a)*dist}px;--bdur:${0.4+Math.random()*0.4}s;--bdelay:0s;`;b.appendChild(d)}el.appendChild(b);setTimeout(()=>b.remove(),1200)});

(function(){let ac=null,playing=false,timer=null;const B=0.42;
const melody=[{f:262,t:0,d:B*.75},{f:262,t:B*.75,d:B*.25},{f:294,t:B*1,d:B},{f:262,t:B*2,d:B},{f:349,t:B*3,d:B},{f:330,t:B*4,d:B*2},{f:262,t:B*6,d:B*.75},{f:262,t:B*6.75,d:B*.25},{f:294,t:B*7,d:B},{f:262,t:B*8,d:B},{f:392,t:B*9,d:B},{f:349,t:B*10,d:B*2},{f:262,t:B*12,d:B*.75},{f:262,t:B*12.75,d:B*.25},{f:523,t:B*13,d:B},{f:440,t:B*14,d:B},{f:349,t:B*15,d:B},{f:330,t:B*16,d:B},{f:294,t:B*17,d:B*2},{f:349,t:B*19,d:B*.75},{f:349,t:B*19.75,d:B*.25},{f:440,t:B*20,d:B},{f:349,t:B*21,d:B},{f:392,t:B*22,d:B},{f:349,t:B*23,d:B*2}];
const bass=[{f:131,t:0,d:B*2},{f:175,t:B*2,d:B*2},{f:131,t:B*4,d:B*2},{f:131,t:B*6,d:B*2},{f:175,t:B*8,d:B*2},{f:131,t:B*10,d:B*2},{f:131,t:B*12,d:B*2},{f:175,t:B*14,d:B*2},{f:131,t:B*16,d:B*2},{f:131,t:B*18,d:B},{f:175,t:B*19,d:B*2},{f:131,t:B*21,d:B*2},{f:131,t:B*23,d:B*2}];
const LOOP=B*25.5;
function box(f,t,dur,vol){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.012);g.gain.exponentialRampToValueAtTime(vol*0.3,t+dur*0.4);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+dur+0.01)}
function bassN(f,t,dur,vol){const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.03);g.gain.setValueAtTime(vol,t+dur*0.7);g.gain.linearRampToValueAtTime(0,t+dur);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+dur+0.01)}
function playLoop(){if(!ac)return;const t0=ac.currentTime+0.05;melody.forEach(n=>box(n.f,t0+n.t,n.d,0.06));bass.forEach(n=>bassN(n.f,t0+n.t,n.d,0.018));timer=setTimeout(playLoop,LOOP*1000)}
const btn=document.getElementById('musicBtn');function start(){if(playing)return;if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();playing=true;btn.classList.add('playing');btn.textContent='🎶';playLoop()}
function stop(){if(!playing)return;if(timer)clearTimeout(timer);if(ac){ac.close();ac=null}playing=false;btn.classList.remove('playing');btn.textContent='🔇'}
btn.addEventListener('click',e=>{e.stopPropagation();if(playing)stop();else start()});
function tryAuto(){try{ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='running'){playing=true;btn.classList.add('playing');btn.textContent='🎶';playLoop();return true}else{ac.close();ac=null;return false}}catch(e){return false}}
if(!tryAuto()){const evts=['click','touchstart','keydown'];function onFirst(){start();evts.forEach(ev=>document.removeEventListener(ev,onFirst,true))}evts.forEach(ev=>document.addEventListener(ev,onFirst,{once:true,capture:true}))}
})();
</script>
</body>
</html>
