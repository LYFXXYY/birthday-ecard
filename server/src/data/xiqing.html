<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      --bg1:#fef7ed;--bg2:#fde8cc;--bg3:#fff9f0;
      --primary:#c47a2a;--primary-light:#e0a04a;--accent:#d4a056;
      --text:#3d2e1a;--text-light:#7a6a50;
      --card-bg:rgba(255,255,255,0.95);
      --shadow:0 8px 32px rgba(196,122,42,0.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(170deg,var(--bg3) 0%,var(--bg1) 50%,var(--bg2) 100%);
      overflow-y:auto;scroll-snap-type:y mandatory;
    }
    .page{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;scroll-snap-align:start}
    .page-one{gap:30px;}
    .header{text-align:center}
    .union-badge{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 28px;background:linear-gradient(135deg,var(--primary),var(--primary-light));
      color:#fff;border-radius:30px;font-size:13px;letter-spacing:3px;margin-bottom:28px;
      box-shadow:0 4px 16px rgba(196,122,42,0.25);
    }
    .union-badge::before{content:"☀";font-size:14px}

    /* 主视觉 - 光晕 */
    .hero-visual{
      width:min(260px,65vw);height:min(260px,65vw);
      position:relative;display:grid;place-items:center;
    }
    .glow-ring{position:absolute;border-radius:50%}
    .glow-ring:nth-child(1){
      inset:0;background:radial-gradient(circle,rgba(224,160,74,0.12) 0%,transparent 70%);
      animation:pulse 4s ease-in-out infinite;
    }
    .glow-ring:nth-child(2){
      inset:15%;background:radial-gradient(circle,rgba(212,160,86,0.1) 0%,transparent 70%);
      animation:pulse 4s ease-in-out infinite 1.3s;
    }
    .glow-ring:nth-child(3){
      inset:30%;border:2px solid var(--accent);opacity:0.15;
      animation:pulse 4s ease-in-out infinite 0.6s;
    }
    .hero-icon{
      font-size:72px;filter:drop-shadow(0 4px 12px rgba(196,122,42,0.2));
      animation:float 3s ease-in-out infinite;
    }

    /* 主标题 */
    .main-title{text-align:center}
    .recipient{
      font-size:clamp(36px,10vw,56px);font-weight:600;
      color:var(--primary);letter-spacing:8px;margin-bottom:14px;
    }
    .greeting-line{
      font-size:clamp(18px,5vw,24px);color:var(--text-light);
      letter-spacing:5px;display:flex;align-items:center;gap:16px;justify-content:center;
    }
    .greeting-line::before,.greeting-line::after{
      content:"";width:44px;height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
    }

    /* 发送者 */
    .sender-info{
      text-align:center;padding:20px 36px;
      background:var(--card-bg);border-radius:16px;box-shadow:var(--shadow);
      border-top:3px solid var(--accent);
    }
    .sender-label{font-size:13px;color:var(--text-light);letter-spacing:2px;margin-bottom:8px}
    .sender-name{font-size:18px;font-weight:500;color:var(--primary);letter-spacing:1px}

    .scroll-tip{
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:3px;opacity:0.7;
      animation:bounce 1.5s ease-in-out infinite;
    }
    .scroll-tip::before,.scroll-tip::after{
      content:"";display:block;width:12px;height:12px;
      border-right:2.5px solid var(--text-light);border-bottom:2.5px solid var(--text-light);
      transform:rotate(45deg);
    }
    .scroll-tip::before{opacity:.4}
    .scroll-tip::after{opacity:.8}

    /* 第二页 - 祝福 */
    .page-two{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
    .card-container{
      width:100%;max-width:400px;background:var(--card-bg);
      border-radius:16px;padding:40px 32px;box-shadow:var(--shadow);position:relative;
    }
    .card-container::before{
      content:"";position:absolute;top:10px;left:10px;right:10px;bottom:10px;
      border:1px solid rgba(196,122,42,0.12);border-radius:10px;pointer-events:none;
    }
    .card-header{
      text-align:center;margin-bottom:28px;padding-bottom:20px;
      border-bottom:1px solid rgba(196,122,42,0.1);
    }
    .card-title{font-size:20px;color:var(--primary);letter-spacing:6px;font-weight:500;margin-bottom:6px}
    .card-subtitle{font-size:12px;color:var(--accent);letter-spacing:2px}
    .blessing-content{
      text-align:center;line-height:2.2;font-size:16px;color:var(--text);
      letter-spacing:1px;min-height:200px;display:flex;align-items:center;
      justify-content:center;white-space:pre-line;
    }
    .card-footer{
      text-align:center;margin-top:28px;padding-top:20px;
      border-top:1px solid rgba(196,122,42,0.1);
    }
    .signature{font-size:14px;color:var(--text-light);letter-spacing:2px}
    .date{font-size:12px;color:var(--accent);margin-top:6px;letter-spacing:1px}

    /* 四角装饰 */
    .deco-corner{
      position:absolute;width:24px;height:24px;color:var(--accent);opacity:0.3;font-size:18px;
      display:grid;place-items:center;
    }
    .deco-corner.top-left{top:14px;left:14px}
    .deco-corner.top-right{top:14px;right:14px}
    .deco-corner.bottom-left{bottom:14px;left:14px}
    .deco-corner.bottom-right{bottom:14px;right:14px}

    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}

    /* 音乐按钮 */
    .music-btn{
      position:fixed;top:16px;right:16px;z-index:99;
      width:36px;height:36px;border-radius:50%;border:none;
      background:var(--card-bg);box-shadow:var(--shadow);
      display:grid;place-items:center;cursor:pointer;
      font-size:16px;color:var(--primary);opacity:0.85;
      transition:opacity .2s;
    }
    .music-btn:hover{opacity:1}
    .music-btn.playing{animation:spin 3s linear infinite}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    @media(max-width:400px){.page{padding:32px 20px}.card-container{padding:32px 24px}.recipient{letter-spacing:5px}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="header"><div class="union-badge">工会祝福</div></div>
    <div class="hero-visual">
      <div class="glow-ring"></div><div class="glow-ring"></div><div class="glow-ring"></div>
      <div class="hero-icon">🎂</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">来自</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip" aria-label="向下滑动"></div>
  </section>
  <section class="page page-two">
    <div class="card-container">
      <div class="deco-corner top-left">✦</div><div class="deco-corner top-right">✦</div>
      <div class="deco-corner bottom-left">✦</div><div class="deco-corner bottom-right">✦</div>
      <div class="card-header"><h2 class="card-title">生日祝福</h2><p class="card-subtitle">HAPPY BIRTHDAY</p></div>
      <!-- editable-start -->
      <div class="blessing-content">{{blessing}}</div>
      <!-- editable-end -->
      <div class="card-footer"><p class="signature">{{sender}} 敬上</p><p class="date">{{year}}年</p></div>
    </div>
  </section>

  <button class="music-btn" id="musicBtn" aria-label="背景音乐">🎵</button>

  <script>
  (function(){
    /* ── 生日歌 · 音乐盒 ── */
    var ac=null,playing=false,timer=null;
    var B=0.42; // 1拍时长(s)

    // 旋律
    var melody=[
      {f:262,t:0,d:B*.75},{f:262,t:B*.75,d:B*.25},
      {f:294,t:B*1,d:B},{f:262,t:B*2,d:B},
      {f:349,t:B*3,d:B},{f:330,t:B*4,d:B*2},
      {f:262,t:B*6,d:B*.75},{f:262,t:B*6.75,d:B*.25},
      {f:294,t:B*7,d:B},{f:262,t:B*8,d:B},
      {f:392,t:B*9,d:B},{f:349,t:B*10,d:B*2},
      {f:262,t:B*12,d:B*.75},{f:262,t:B*12.75,d:B*.25},
      {f:523,t:B*13,d:B},{f:440,t:B*14,d:B},
      {f:349,t:B*15,d:B},{f:330,t:B*16,d:B},{f:294,t:B*17,d:B*2},
      {f:349,t:B*19,d:B*.75},{f:349,t:B*19.75,d:B*.25},
      {f:440,t:B*20,d:B},{f:349,t:B*21,d:B},
      {f:392,t:B*22,d:B},{f:349,t:B*23,d:B*2}
    ];
    // 低音
    var bass=[
      {f:131,t:B*0,d:B*2},{f:175,t:B*2,d:B*2},{f:131,t:B*4,d:B*2},
      {f:131,t:B*6,d:B*2},{f:175,t:B*8,d:B*2},{f:131,t:B*10,d:B*2},
      {f:131,t:B*12,d:B*2},{f:175,t:B*14,d:B*2},{f:131,t:B*16,d:B*2},{f:131,t:B*18,d:B},
      {f:175,t:B*19,d:B*2},{f:131,t:B*21,d:B*2},{f:131,t:B*23,d:B*2}
    ];
    // 装饰音
    var sparkle=[
      {f:523,t:B*5.5,d:B*.5},{f:587,t:B*11.5,d:B*.5},
      {f:659,t:B*17.5,d:B*.5},{f:523,t:B*24.5,d:B*.5}
    ];
    var LOOP=B*25.5;

    function box(freq,t,dur,vol){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.015);
      g.gain.exponentialRampToValueAtTime(vol*0.4,t+dur*0.4);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.connect(g).connect(ac.destination);
      o.start(t);o.stop(t+dur+0.01);
      // 泛音
      var o2=ac.createOscillator(),g2=ac.createGain();
      o2.type='sine';o2.frequency.value=freq*2;
      g2.gain.setValueAtTime(0,t);
      g2.gain.linearRampToValueAtTime(vol*0.12,t+0.01);
      g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.5);
      o2.connect(g2).connect(ac.destination);
      o2.start(t);o2.stop(t+dur*0.5+0.01);
    }
    function bassN(freq,t,dur,vol){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='triangle';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.04);
      g.gain.setValueAtTime(vol,t+dur*0.7);
      g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(g).connect(ac.destination);
      o.start(t);o.stop(t+dur+0.01);
    }

    function playLoop(){
      if(!ac)return;
      var t0=ac.currentTime+0.05;
      for(var i=0;i<melody.length;i++){var n=melody[i];box(n.f,t0+n.t,n.d,0.10);}
      for(var i=0;i<bass.length;i++){var n=bass[i];bassN(n.f,t0+n.t,n.d,0.035);}
      for(var i=0;i<sparkle.length;i++){var n=sparkle[i];box(n.f,t0+n.t,n.d,0.05);}
      timer=setTimeout(playLoop,LOOP*1000);
    }

    var btn=document.getElementById('musicBtn');

    function startMusic(){
      if(playing)return;
      if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();
      if(ac.state==='suspended')ac.resume();
      playing=true;
      btn.classList.add('playing');
      btn.textContent='🎶';
      playLoop();
    }
    function stopMusic(){
      if(!playing)return;
      if(timer)clearTimeout(timer);
      if(ac){ac.close();ac=null;}
      playing=false;
      btn.classList.remove('playing');
      btn.textContent='🔇';
    }

    btn.addEventListener('click',function(e){
      e.stopPropagation();
      if(playing)stopMusic();else startMusic();
    });

    // 自动播放策略：先尝试直接播放，失败则等首次交互
    function tryAutoplay(){
      try{
        ac=new(window.AudioContext||window.webkitAudioContext)();
        if(ac.state==='running'){
          playing=true;
          btn.classList.add('playing');
          btn.textContent='🎶';
          playLoop();
          return true;
        }else{
          ac.close();ac=null;
          return false;
        }
      }catch(e){return false;}
    }

    if(!tryAutoplay()){
      var events=['click','touchstart','scroll','keydown'];
      function onFirstInteraction(){
        startMusic();
        events.forEach(function(ev){document.removeEventListener(ev,onFirstInteraction,true);});
      }
      events.forEach(function(ev){document.addEventListener(ev,onFirstInteraction,{once:true,capture:true});});
    }
  })();
  </script>
</body>
</html>
