<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,viewport-fit=cover">
<title>🎂 员工生日贺卡</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "PingFang SC","Microsoft YaHei", sans-serif; touch-action: none; color: #333; }

    :root{
      --bg1:#fbe0ea;
      --bg2:#f6ccdc;
      --bg3:#f9eff4;
      --ink:#241521;
      --pink:#d76f97;
      --pink-2:#f49db9;
      --rose:#f8bfd0;
      --rose-2:#ffd9e6;
      --card:#fff8fb;
      --line:#f2b2c8;
      --shadow:0 18px 50px rgba(153, 55, 95, .18);
    }

    #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .swiper-container {
        width: 100%; height: 100%; position: relative; z-index: 10;
        display: flex; flex-direction: column;
        transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .page {
        min-height: 100vh; width: 100%; flex-shrink: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: relative; overflow: hidden; padding: 24px;
    }

    /* ===== 封面 / 尾封 专属 Canvas ===== */
    .page-canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

    /* ===== 封面装饰层 ===== */
    .cover-decor { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
    .cover-bubble {
        position: absolute; border-radius: 50%; opacity: 0;
        animation: coverBubble var(--dur, 6s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes coverBubble {
        0% { transform: translateY(0) scale(0.6); opacity: 0; }
        15% { opacity: var(--op, 0.5); transform: translateY(-20px) scale(1); }
        85% { opacity: var(--op, 0.5); }
        100% { transform: translateY(-100vh) scale(0.4); opacity: 0; }
    }
    .cover-star {
        position: absolute; opacity: 0; animation: coverStar var(--dur, 4s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes coverStar {
        0%, 100% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
        20% { opacity: var(--op, 0.7); }
        50% { transform: translateY(-12px) rotate(180deg) scale(1.1); }
        80% { opacity: var(--op, 0.7); }
    }
    .cover-spiral {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        border-radius: 50%; border: 1.5px solid;
        animation: spiralExpand var(--dur, 5s) var(--delay, 0s) ease-out infinite;
    }
    @keyframes spiralExpand {
        0% { width: 0; height: 0; opacity: 0.8; }
        100% { width: min(90vw, 500px); height: min(90vw, 500px); opacity: 0; }
    }

    /* ===== 中央大视觉 ===== */
    .center-visual {
        position: relative; z-index: 5;
        display: grid; place-items: center;
    }
    .main-emoji {
        font-size: clamp(70px, 20vw, 120px);
        animation: mainBounce 3s ease-in-out infinite;
        filter: drop-shadow(0 12px 35px rgba(255,170,50,0.3));
    }
    @keyframes mainBounce {
        0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
        25% { transform: translateY(-18px) rotate(2deg) scale(1.03); }
        50% { transform: translateY(0) rotate(-1deg) scale(1); }
        75% { transform: translateY(-10px) rotate(1deg) scale(1.02); }
    }
    .orbit-ring {
        position: absolute; inset: -18%; border-radius: 50%;
        border: 2px dashed rgba(255,180,60,0.2);
        animation: orbitSpin 12s linear infinite;
    }
    .orbit-ring:nth-child(2) { inset: -30%; border-color: rgba(255,180,60,0.1); animation-duration: 18s; animation-direction: reverse; }
    .orbit-ring:nth-child(3) { inset: -42%; border-color: rgba(255,180,60,0.05); animation-duration: 24s; }
    @keyframes orbitSpin { to { transform: rotate(360deg); } }
    .orbit-dot {
        position: absolute; width: 10px; height: 10px; border-radius: 50%;
        top: 50%; left: 50%;
        animation: orbitDot 4s linear infinite;
    }
    @keyframes orbitDot {
        0% { transform: rotate(0deg) translateX(min(38vw, 180px)) rotate(0deg); }
        100% { transform: rotate(360deg) translateX(min(38vw, 180px)) rotate(-360deg); }
    }

    /* ===== 第2页：员工信息 - 粉色背景 ===== */
    .page-2 { background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 40%, #fce4ec 100%); }
    .info-card {
        width: 88%; max-width: 420px; position: relative; z-index: 5;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        border: 1.5px solid rgba(240, 98, 146, 0.2);
        border-radius: 24px; padding: 0; text-align: center;
        box-shadow: 0 16px 50px rgba(0,0,0,0.06), 0 0 30px rgba(240, 98, 146, 0.06);
        overflow: hidden;
    }
    .info-card::before {
        content: ""; position: absolute; inset: -1px; border-radius: 24px; pointer-events: none;
        background: conic-gradient(from 0deg, transparent, rgba(240, 98, 146, 0.22), transparent, rgba(245, 124, 158, 0.16), transparent);
        z-index: -1; animation: borderSpin 8s linear infinite;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude; -webkit-mask-composite: xor;
        padding: 1.5px;
    }
    @keyframes borderSpin { to { transform: rotate(360deg); } }

    .info-card-header {
        padding: 32px 32px 20px;
        background: linear-gradient(135deg, rgba(240, 98, 146, 0.08), rgba(245, 124, 158, 0.05));
    }
    .info-avatar {
        width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;
        background: linear-gradient(135deg, #f48fb1, #ec407a);
        display: grid; place-items: center; font-size: 32px; color: #fff;
        box-shadow: 0 8px 24px rgba(240, 98, 146, 0.25);
        position: relative;
    }
    .info-avatar::after {
        content: ""; position: absolute; inset: -5px; border-radius: 50%;
        border: 2px solid rgba(240, 98, 146, 0.2);
        animation: avatarRing 3s ease-in-out infinite;
    }
    @keyframes avatarRing {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.2; }
    }
    .info-label {
        font-size: 11px; color: #ec407a; letter-spacing: 5px; text-transform: uppercase;
        margin-bottom: 4px;
    }
    .info-name {
        font-size: clamp(26px, 7vw, 38px); font-weight: 700; color: #c2185b;
        letter-spacing: 4px;
    }
    .info-dept {
        font-size: clamp(12px, 2.5vw, 15px); color: #ec407a; letter-spacing: 2px;
        padding: 6px 0 20px;
    }
    .info-card-body { padding: 0 32px 32px; }
    .info-divider {
        width: 60px; height: 2px; margin: 0 auto 22px;
        background: linear-gradient(90deg, transparent, #f48fb1, transparent);
    }
    .info-details { display: flex; flex-direction: column; gap: 14px; }
    .info-row {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        font-size: clamp(13px, 3vw, 15px); color: #555;
        padding: 8px 16px; border-radius: 10px;
        background: rgba(240, 98, 146, 0.05);
        transition: background 0.3s;
    }
    .info-row:hover { background: rgba(240, 98, 146, 0.1); }
    .info-row .icon { font-size: 18px; }

    /* ===== 第3页：祝福语 - 粉色背景 ===== */
    .page-3 { background: linear-gradient(160deg, #f8bbd0 0%, #fce4ec 40%, #f8bbd0 100%); }
    .bless-card {
        width: 88%; max-width: 420px; position: relative; z-index: 5;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        border: 1.5px solid rgba(245, 124, 158, 0.15);
        border-radius: 24px; padding: 0; text-align: center;
        box-shadow: 0 16px 50px rgba(0,0,0,0.06), 0 0 30px rgba(245, 124, 158, 0.05);
        overflow: hidden;
    }
    .bless-card::before {
        content: ""; position: absolute; inset: -1px; border-radius: 24px; pointer-events: none;
        background: conic-gradient(from 0deg, transparent, rgba(245, 124, 158, 0.2), transparent, rgba(236, 64, 122, 0.14), transparent);
        z-index: -1; animation: borderSpin 7s linear infinite;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude; -webkit-mask-composite: xor;
        padding: 1.5px;
    }
    .bless-card-header {
        padding: 28px 28px 18px;
        background: linear-gradient(135deg, rgba(245, 124, 158, 0.06), rgba(236, 64, 122, 0.04));
    }
    .bless-header {
        font-size: 11px; color: #ec407a; letter-spacing: 5px; text-transform: uppercase;
        margin-bottom: 4px;
    }
    .bless-title {
        font-size: clamp(20px, 5vw, 28px); font-weight: 600; color: #c2185b;
        letter-spacing: 3px;
    }
    .bless-card-body { padding: 24px 28px; }
    .bless-text {
        text-align: left; font-size: clamp(14px, 3.2vw, 16px); line-height: 2.2;
        color: #5d4037; text-indent: 2em; white-space: pre-wrap;
    }
    .bless-card-footer {
        padding: 18px 28px 28px;
        border-top: 1px dashed rgba(245, 124, 158, 0.2);
        display: flex; flex-direction: column; gap: 4px;
    }
    .bless-sign { font-size: 14px; color: #884477; letter-spacing: 2px; }
    .bless-date { font-size: 12px; color: #b57595; letter-spacing: 1px; }

    /* ===== 全新第四页：粉色背景 祝福结尾页 ===== */
    .page-4 { 
        background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 40%, #fce4ec 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        text-align: center;
    }
    .final-emoji {
        font-size: 120px; /* 礼炮放大 */
        margin-bottom: 20px;
        animation: bounce 2s infinite ease-in-out;
    }
    .final-title {
        font-size: clamp(30px, 8vw, 42px);
        color: #c2185b;
        font-weight: 700;
        margin-bottom: 16px;
        letter-spacing: 2px;
    }
    .final-text {
        font-size: clamp(18px, 4.5vw, 22px);
        color: #664466;
        line-height: 1.8;
    }
    @keyframes bounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* ===== 入场动画 ===== */
    .anim-item {
        opacity: 0; transform: translateY(28px);
        transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .anim-item.visible {
        opacity: 1; transform: translateY(0);
    }
    .anim-d1 { transition-delay: 0.1s; }
    .anim-d2 { transition-delay: 0.2s; }
    .anim-d3 { transition-delay: 0.3s; }
    .anim-d4 { transition-delay: 0.4s; }
    .anim-d5 { transition-delay: 0.5s; }
    .anim-d6 { transition-delay: 0.6s; }
    .anim-d7 { transition-delay: 0.7s; }
    .anim-d8 { transition-delay: 0.8s; }

    /* ===== 箭头 ===== */
    .arrow {
        position: absolute; bottom: 26px; left: 50%; width: 24px; height: 24px;
        border-right: 2.5px solid rgba(236, 64, 122, 0.5);
        border-bottom: 2.5px solid rgba(236, 64, 122, 0.5);
        transform: translateX(-50%) rotate(45deg);
        animation: arrowBounce 1.8s ease-in-out infinite;
        cursor: pointer; z-index: 20; opacity: 0.6;
    }
    @keyframes arrowBounce {
        0%, 100% { transform: translateX(-50%) rotate(45deg) translateY(0); opacity: 0.4; }
        50% { transform: translateX(-50%) rotate(45deg) translateY(-10px); opacity: 0.8; }
    }

    /* ===== 翻页指示点 ===== */
    .page-dots {
        position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 10px; z-index: 50;
    }
    .page-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(236, 64, 122, 0.25); transition: all 0.4s;
    }
    .page-dot.active {
        background: #ec407a; box-shadow: 0 0 8px rgba(236, 64, 122, 0.4);
        transform: scale(1.4);
    }

    /* ===== 音乐按钮 ===== */
    .music-btn {
        position: fixed; top: 16px; right: 16px; z-index: 100;
        width: 40px; height: 40px; border-radius: 50%;
        background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
        border: 1.5px solid rgba(236, 64, 122, 0.25);
        display: grid; place-items: center; cursor: pointer;
        font-size: 17px; color: #ec407a; transition: all 0.3s;
    }
    .music-btn:hover { background: rgba(236, 64, 122, 0.15); transform: scale(1.1); }
    .music-btn.playing { animation: musicSpin 3s linear infinite; }
    @keyframes musicSpin { to { transform: rotate(360deg); } }

    #trailCanvas { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

    .particle-burst { position: absolute; pointer-events: none; z-index: 5; }
    .burst-dot {
        position: absolute; border-radius: 50%; opacity: 0;
        animation: burstFly var(--bdur, 1s) var(--bdelay, 0s) ease-out forwards;
    }
    @keyframes burstFly {
        0% { transform: translate(0,0) scale(1); opacity: 1; }
        100% { transform: translate(var(--bx, 50px), var(--by, -60px)) scale(0); opacity: 0; }
    }

    .float-items { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .float-item {
        position: absolute; opacity: 0;
        animation: floatUp var(--dur, 7s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes floatUp {
        0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
        12% { opacity: 0.6; transform: translateY(-15px) rotate(8deg) scale(1); }
        88% { opacity: 0.6; }
        100% { transform: translateY(-105vh) rotate(var(--rot, 15deg)) scale(0.6); opacity: 0; }
    }

    /* ===== 你提供的第一页专属样式 ===== */
    .page-one{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:18px 18px 22px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.7) 0 8%, transparent 9%),
        radial-gradient(circle at 80% 16%, rgba(255,255,255,.45) 0 6%, transparent 7%),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,.28) 0 4%, transparent 5%),
        linear-gradient(180deg, var(--bg3), var(--bg1) 40%, var(--bg2));
    }
    .page-one::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 22%, rgba(255,255,255,.22) 0 1px, transparent 1.5px) 0 0/32px 32px,
        radial-gradient(circle at 55% 66%, rgba(255,255,255,.16) 0 1px, transparent 1.5px) 0 0/38px 38px,
        radial-gradient(circle at 78% 36%, rgba(255,255,255,.18) 0 1px, transparent 1.5px) 0 0/44px 44px;
      opacity:.35;
      mix-blend-mode:screen;
    }
    .hero{
      width:min(420px,100%);
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:10px 0 0;
      position:relative;
      z-index:2;
    }
    .blob{
      position:absolute;
      inset:auto;
      width:92%;
      max-width:410px;
      aspect-ratio:1/1;
      border-radius:48% 52% 44% 56%/55% 42% 58% 45%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.88) 0 14%, transparent 15%),
        radial-gradient(circle at 70% 26%, rgba(255,255,255,.55) 0 10%, transparent 11%),
        linear-gradient(145deg, rgba(242,152,181,.9), rgba(242,194,208,.88));
      filter:blur(.2px);
      box-shadow: inset 0 0 40px rgba(255,255,255,.18);
      transform:translateY(12px);
      z-index:-2;
      animation:blobMove 10s ease-in-out infinite;
    }
    .blob.a{top:13%; left:50%; translate:-50% 0; opacity:.95;}
    .blob.b{
      width:74%;
      top:20%;
      left:50%;
      translate:-50% 0;
      opacity:.55;
      background:linear-gradient(145deg, rgba(255,255,255,.34), rgba(255,210,224,.12));
      filter:blur(18px);
      animation-duration:14s;
    }
    .cake-wrap{
      width:min(430px, 100%);
      height:min(55vh, 490px);
      position:relative;
      display:grid;
      place-items:center;
      margin-top:10px;
    }
    .cake-card-shadow{
      position:absolute;
      inset:auto;
      bottom:38px;
      width:78%;
      height:90px;
      border-radius:50%;
      background:rgba(186,90,125,.12);
      filter:blur(12px);
      transform:scaleY(.55);
      animation:shadowPulse 4.2s ease-in-out infinite;
    }
    .cake-svg{
      width:min(96%, 470px);
      height:auto;
      filter:drop-shadow(0 18px 28px rgba(148,67,103,.18));
      animation:cakeBob 4.8s ease-in-out infinite;
    }
    .sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .sparkles .dot{
      position:absolute;
      color:rgba(255,255,255,.95);
      text-shadow:0 0 8px rgba(255,255,255,.45);
      animation:twinkle var(--d,3s) ease-in-out infinite;
      transform-origin:center;
    }
    .sparkles .star{
      position:absolute;
      color:#fff2ac;
      filter:drop-shadow(0 0 6px rgba(255,224,108,.45));
      animation:twinkle var(--d,3s) ease-in-out infinite;
      transform-origin:center;
    }
    .title{
      margin-top:-8px;
      text-align:center;
      z-index:2;
      width:min(420px,100%);
      color:#100810;
    }
    .title .line{
      display:flex;
      align-items:center;
      gap:14px;
      justify-content:center;
      margin-bottom:8px;
    }
    .title .line::before,.title .line::after{
      content:"";
      width:28%;
      height:1.5px;
      background:linear-gradient(90deg, transparent, rgba(49,22,33,.82), transparent);
    }
    .title h1{
      margin:0;
      font-family: "STSong","Songti SC","SimSun",serif;
      font-size: clamp(30px, 8.2vw, 54px);
      font-weight:500;
      letter-spacing:.08em;
      line-height:1;
    }
    .title .sub{
      font-family: Georgia, "Times New Roman", serif;
      margin-top:8px;
      line-height:.88;
      font-size: clamp(22px, 6vw, 38px);
      letter-spacing:.03em;
      font-weight:60;
    }
    .ornaments{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }
    .ornament{
      position:absolute;
      opacity:.9;
      font-size:14px;
      animation:driftUp var(--d,7s) linear infinite;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.18));
    }
    .is-active .cake-svg,
    .is-active .title{
        animation-play-state:running;
    }
    .title{
        animation-play-state:paused;
    }

    @keyframes cakeBob{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-10px) scale(1.01)}
    }
    @keyframes blobMove{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(0,-10px,0) scale(1.02)}
    }
    @keyframes twinkle{
      0%,100%{transform:translateY(0) scale(.88); opacity:.5}
      50%{transform:translateY(-8px) scale(1.14); opacity:1}
    }
    @keyframes shadowPulse{
      0%,100%{transform:scaleX(1) scaleY(.55); opacity:.72}
      50%{transform:scaleX(1.06) scaleY(.5); opacity:.95}
    }
    @keyframes driftUp{
      from{transform:translateY(24px) translateX(0) rotate(0deg); opacity:0}
      12%{opacity:.9}
      to{transform:translateY(-120vh) translateX(var(--dx, 20px)) rotate(8deg); opacity:0}
    }

    @media (max-width: 420px) {
        .info-card-header { padding: 24px 20px 16px; }
        .info-card-body { padding: 0 20px 24px; }
        .bless-card-header { padding: 22px 20px 14px; }
        .bless-card-body { padding: 18px 20px; }
        .bless-card-footer { padding: 14px 20px 22px; }
        .page-one{padding:14px 14px 18px}
        .cake-wrap{height:min(53vh, 440px)}
    }
    /* ===== 返回后台按钮 ===== */
    .admin-btn {
        position: fixed; top: 16px; left: 16px; z-index: 200;
        display: flex; align-items: center; gap: 6px;
        padding: 7px 14px; border-radius: 20px;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1.5px solid rgba(236, 64, 122, 0.25);
        color: #884466; font-size: 12px; letter-spacing: 1px;
        text-decoration: none; cursor: pointer; transition: all 0.3s;
    }
    .admin-btn:hover { background: rgba(236, 64, 122, 0.1); color: #c2185b; border-color: rgba(236, 64, 122, 0.4); }
    .admin-btn svg { width: 14px; height: 14px; fill: currentColor; }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
</style>
</head>
<body>

<!-- 返回后台按钮 -->
<a class="admin-btn" href="http://localhost:5173" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    返回管理后台
</a>

<canvas id="bgCanvas"></canvas>
<canvas id="trailCanvas"></canvas>
<div class="float-items" id="floatItems"></div>

<div class="page-dots" id="pageDots">
    <div class="page-dot active"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>

<script>
// ========================================================
//  翻页控制
// ========================================================
let currentPage = 0;
const totalPages = 4;
const swiper = document.getElementById('swiper');
const dots = document.querySelectorAll('.page-dot');

function updateSlide() {
    swiper.style.transform = `translateY(-${currentPage * 100}vh)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === currentPage));
    triggerPageAnim(currentPage);
}
function nextPage() {
    if (currentPage < totalPages - 1) { currentPage++; updateSlide(); burstPage(); }
}
function prevPage() {
    if (currentPage > 0) { currentPage--; updateSlide(); }
}

let tSY = 0;
document.addEventListener('touchstart', e => { tSY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
    const d = tSY - e.changedTouches[0].clientY;
    if (d > 45) nextPage(); else if (d < -45) prevPage();
});

let wheelLock = false;
document.addEventListener('wheel', e => {
    e.preventDefault();
    if (wheelLock) return;
    wheelLock = true;
    if (e.deltaY > 0) nextPage(); else prevPage();
    setTimeout(() => wheelLock = false, 850);
}, { passive: false });

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); prevPage(); }
});

// ========================================================
//  入场动画触发
// ========================================================
function triggerPageAnim(pageIndex) {
    const pageEl = document.getElementById('page' + (pageIndex + 1));
    if (!pageEl) return;
    const items = pageEl.querySelectorAll('.anim-item');
    items.forEach(item => item.classList.remove('visible'));
    void pageEl.offsetWidth;
    items.forEach((item, i) => {
        setTimeout(() => item.classList.add('visible'), 80);
    });
}

// ========================================================
//  1. Canvas 背景 - 明亮泡泡 + 金色光点
// ========================================================
(function() {
    const c = document.getElementById('bgCanvas');
    const ctx = c.getContext('2d');
    let W, H;
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
    window.addEventListener('resize', resize); resize();

    const bubbles = [];
    for (let i = 0; i < 30; i++) {
        bubbles.push({
            x: Math.random() * W, y: Math.random() * H,
            r: Math.random() * 16 + 5, vx: (Math.random() - 0.5) * 0.35,
            vy: -Math.random() * 0.4 - 0.12,
            alpha: Math.random() * 0.1 + 0.02, hue: Math.random() * 50 + 40
        });
    }
    const sparkles = [];
    for (let i = 0; i < 45; i++) {
        sparkles.push({
            x: Math.random() * W, y: Math.random() * H,
            r: Math.random() * 1.8 + 0.4, alpha: Math.random(),
            speed: Math.random() * 0.25 + 0.04, twinkle: Math.random() * Math.PI * 2
        });
    }

    function loop() {
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, W, H);
        bubbles.forEach(b => {
            b.x += b.vx; b.y += b.vy;
            if (b.y + b.r < 0) { b.y = H + b.r; b.x = Math.random() * W; }
            if (b.x < -b.r) b.x = W + b.r;
            if (b.x > W + b.r) b.x = -b.r;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${b.hue}, 65%, 65%, ${b.alpha})`; ctx.fill();
            ctx.beginPath(); ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${b.hue}, 50%, 88%, ${b.alpha * 1.4})`; ctx.fill();
        });
        sparkles.forEach(s => {
            s.twinkle += 0.018;
            const a = 0.12 + Math.sin(s.twinkle) * 0.22;
            ctx.fillStyle = `rgba(255, 180, 60, ${a})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
            s.y -= s.speed;
            if (s.y < -5) { s.y = H + 5; s.x = Math.random() * W; }
        });
    }
    loop();
})();

// ========================================================
//  2. 鼠标/触摸拖尾
// ========================================================
(function() {
    const c = document.getElementById('trailCanvas');
    const ctx = c.getContext('2d');
    let W, H;
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
    window.addEventListener('resize', resize); resize();

    const dots = [];
    const maxDots = 40;
    function addDot(x, y) {
        dots.push({
            x, y, alpha: 0.7, size: Math.random() * 4 + 2,
            color: `hsl(${Math.random() * 50 + 80}, 65%, 65%)`
        });
        if (dots.length > maxDots) dots.shift();
    }
    document.addEventListener('mousemove', e => addDot(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => {
        for (let i = 0; i < e.touches.length; i++) addDot(e.touches[i].clientX, e.touches[i].clientY);
    }, { passive: true });

    function loop() {
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < dots.length; i++) {
            const d = dots[i];
            d.alpha -= 0.015; d.size *= 0.97;
            if (d.alpha <= 0) { dots.splice(i, 1); i--; continue; }
            ctx.save();
            ctx.globalAlpha = d.alpha; ctx.fillStyle = d.color;
            ctx.shadowBlur = 8; ctx.shadowColor = d.color;
            ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }
    loop();
})();

// ========================================================
//  3. 浮动装饰
// ========================================================
(function() {
    const container = document.getElementById('floatItems');
    const items = ['🌟','✨','💫','🌸','🍃','⭐','🎀','💛','🩷','🌼'];
    for (let i = 0; i < 14; i++) {
        const span = document.createElement('span');

            left: ${Math.random() * 95}%; bottom: -30px;
            font-size: ${12 + Math.random() * 14}px;
            --dur: ${6 + Math.random() * 8}s; --delay: ${Math.random() * 12}s;
            --rot: ${Math.random() * 40 - 20}deg;

        container.appendChild(span);

})();

// ========================================================
//  4. 翻页粒子爆炸
// ========================================================
function burstPage() {
    const pageEl = document.getElementById('page' + (currentPage + 1));
    if (!pageEl) return;
    const burst = document.createElement('div');
    burst.className = 'particle-burst';
    burst.style.left = '50%'; burst.style.top = '50%';
    const colors = ['#ec407a','#f48fb1','#f8bbd0','#ffb74d','#ff8a65','#ce93d8'];
    for (let i = 0; i < 28; i++) {
        const dot = document.createElement('div');
        dot.className = 'burst-dot';
        const angle = (Math.PI * 2 / 28) * i;
        const dist = 45 + Math.random() * 90;
        dot.style.cssText = `
            width: 5px; height: 5px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            --bx: ${Math.cos(angle) * dist}px; --by: ${Math.sin(angle) * dist}px;
            --bdur: ${0.5 + Math.random() * 0.7}s; --bdelay: ${Math.random() * 0.15}s;
        `;
        burst.appendChild(dot);
    }
    pageEl.appendChild(burst);
    setTimeout(() => burst.remove(), 2000);
}

// ========================================================
//  5. 点击触发粒子
// ========================================================
document.addEventListener('click', function(e) {
    if (e.target.closest('.music-btn') || e.target.closest('.arrow') || e.target.closest('.page-dot')) return;
    const cx = e.clientX, cy = e.clientY;
    const container = document.getElementById('page' + (currentPage + 1));
    const burst = document.createElement('div');
    burst.className = 'particle-burst';
    burst.style.left = cx + 'px'; burst.style.top = cy + 'px';
    const colors = ['#ec407a','#f48fb1','#ffb74d','#ff8a65','#ce93d8','#ffd54f'];
    for (let i = 0; i < 16; i++) {
        const dot = document.createElement('div');
        dot.className = 'burst-dot';
        const angle = (Math.PI * 2 / 16) * i;
        const dist = 20 + Math.random() * 55;
        dot.style.cssText = `
            width: 4px; height: 4px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            --bx: ${Math.cos(angle) * dist}px; --by: ${Math.sin(angle) * dist}px;
            --bdur: ${0.4 + Math.random() * 0.5}s; --bdelay: 0s;
        `;
        burst.appendChild(dot);
    }
    container.appendChild(burst);
    setTimeout(() => burst.remove(), 1200);
});

// ========================================================
//  6. 音乐盒（完整保留）
// ========================================================
(function() {
    let ac = null, playing = false, timer = null;
    const B = 0.42;
    const melody = [
        {f:262,t:0,d:B*.75},{f:262,t:B*.75,d:B*.25},
        {f:294,t:B*1,d:B},{f:262,t:B*2,d:B},
        {f:349,t:B*3,d:B},{f:330,t:B*4,d:B*2},
        {f:262,t:B*6,d:B*.75},{f:262,t:B*6.75,d:B*.25},
        {f:294,t:B*7,d:B},{f:262,t:B*8,d:B},
        {f:392,t:B*9,d:B},{f:349,t:B*10,d:B*2},
        {f:262,t:B*12,d:B*.75},{f:262,t:B*12.75,d:B*.25},
        {f:523,t:B*13,d:B},{f:440,t:B*14,d:B},
        {f:349,t:B*15,d:B},{f:330,t:B*16,d:B},{f:294,t:B*17,d:B*2},
        {f:349,t:B*19,d:B*.75},{f:349,t:B*19.75,d:B*.25},
        {f:440,t:B*20,d:B},{f:349,t:B*21,d:B},
        {f:392,t:B*22,d:B},{f:349,t:B*23,d:B*2}
    ];
    const bass = [
        {f:131,t:0,d:B*2},{f:175,t:B*2,d:B*2},{f:131,t:B*4,d:B*2},
        {f:131,t:B*6,d:B*2},{f:175,t:B*8,d:B*2},{f:131,t:B*10,d:B*2},
        {f:131,t:B*12,d:B*2},{f:175,t:B*14,d:B*2},{f:131,t:B*16,d:B*2},
        {f:131,t:B*18,d:B},{f:175,t:B*19,d:B*2},{f:131,t:B*21,d:B*2},{f:131,t:B*23,d:B*2}
    ];
    const LOOP = B * 25.5;

    function box(freq, t, dur, vol) {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.012);
        g.gain.exponentialRampToValueAtTime(vol * 0.3, t + dur * 0.4);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g).connect(ac.destination);
        o.start(t); o.stop(t + dur + 0.01);
        const o2 = ac.createOscillator(), g2 = ac.createGain();
        o2.type = 'sine'; o2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(vol * 0.06, t + 0.008);
        g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.5);
        o2.connect(g2).connect(ac.destination);
        o2.start(t); o2.stop(t + dur * 0.5 + 0.01);
    }
    function bassN(freq, t, dur, vol) {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.03);
        g.gain.setValueAtTime(vol, t + dur * 0.7);
        g.gain.linearRampToValueAtTime(0, t + dur);
        o.connect(g).connect(ac.destination);
        o.start(t); o.stop(t + dur + 0.01);
    }
    function playLoop() {
        if (!ac) return;
        const t0 = ac.currentTime + 0.05;
        melody.forEach(n => box(n.f, t0 + n.t, n.d, 0.07));
        bass.forEach(n => bassN(n.f, t0 + n.t, n.d, 0.02));
        timer = setTimeout(playLoop, LOOP * 1000);
    }

    const btn = document.getElementById('musicBtn');
    function startMusic() {
        if (playing) return;
        if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') ac.resume();
        playing = true; btn.classList.add('playing'); btn.textContent = '🎶'; playLoop();
    }
    function stopMusic() {
        if (!playing) return;
        if (timer) clearTimeout(timer);
        if (ac) { ac.close(); ac = null; }
        playing = false; btn.classList.remove('playing'); btn.textContent = '🔇';
    }
    btn.addEventListener('click', e => { e.stopPropagation(); if (playing) stopMusic(); else startMusic(); });

    function tryAuto() {
        try {
            ac = new (window.AudioContext || window.webkitAudioContext)();
            if (ac.state === 'running') {
                playing = true; btn.classList.add('playing'); btn.textContent = '🎶'; playLoop(); return true;
            } else { ac.close(); ac = null; return false; }
        } catch(e) { return false; }
    }
    if (!tryAuto()) {
        const evts = ['click','touchstart','keydown'];
        function onFirst() {
            startMusic();
            evts.forEach(ev => document.removeEventListener(ev, onFirst, true));
        }
        evts.forEach(ev => document.addEventListener(ev, onFirst, { once: true, capture: true }));
    }
})();

// ========================================================
//  蛋糕页动画
// ========================================================
const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function addOrnaments(rootId, count, kind) {
  const root = document.getElementById(rootId);
  if (!root) return;
  const symbols = kind === 'heart' ? ['♥', '♡'] : ['✦', '•', '✧'];
  for (let i = 0; i < count; i++) {
    const span = document.createElement('span');
    span.className = 'ornament';
    span.textContent = symbols[i % symbols.length];
    span.style.left = Math.random() * 100 + '%';
    span.style.top = (80 + Math.random() * 20) + '%';
    span.style.fontSize = (10 + Math.random() * 14) + 'px';
    span.style.color = kind === 'heart'
      ? ['#ff9ab8','#ff769a','#ffc1d4'][i % 3]
      : ['#ffffff','#fff2ad','#ffd5e2'][i % 3];
    span.style.setProperty('--d', (4 + Math.random() * 5) + 's');
    span.style.setProperty('--dx', ((Math.random() * 80) - 40) + 'px');
    span.style.animationDelay = (Math.random() * 6) + 's';
    root.appendChild(span);
  }
}

function activatePages() {
  const pages = document.querySelectorAll('.page');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('is-active');
    });
  }, { threshold: 0.45 });
  pages.forEach(page => io.observe(page));
  pages[0].classList.add('is-active');
}

if (!prefersReduced) {
  addOrnaments('ornaments-1', 14, 'sparkle');
  activatePages();
} else {
  addOrnaments('ornaments-1', 4, 'sparkle');
}
