<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      --bg1:#fbe0ea;
      --bg2:#f6ccdc;
      --bg3:#f9eff4;
      --ink:#241521;
      --pink:#d76f97;
      --pink-2:#f49db9;
      --rose:#f8bfd0;
      --rose-2:#ffd9e6;
      --card:#fff8fb;
      --line:#f2b2c8;
      --shadow:0 18px 50px rgba(153, 55, 95, .18);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      overflow-y:auto;
      scroll-snap-type:y mandatory;
      font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.7) 0 8%, transparent 9%),
        radial-gradient(circle at 80% 16%, rgba(255,255,255,.45) 0 6%, transparent 7%),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,.28) 0 4%, transparent 5%),
        linear-gradient(180deg, var(--bg3), var(--bg1) 40%, var(--bg2));
      touch-action:pan-y;
    }
    .page{
      min-height:100vh;
      position:relative;
      overflow:hidden;
      scroll-snap-align:start;
      isolation:isolate;
    }
    .page::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 22%, rgba(255,255,255,.22) 0 1px, transparent 1.5px) 0 0/32px 32px,
        radial-gradient(circle at 55% 66%, rgba(255,255,255,.16) 0 1px, transparent 1.5px) 0 0/38px 38px,
        radial-gradient(circle at 78% 36%, rgba(255,255,255,.18) 0 1px, transparent 1.5px) 0 0/44px 44px;
      opacity:.35;
      mix-blend-mode:screen;
    }
    .page-one{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:18px 18px 22px;
    }
    .brand{
      width:min(420px,100%);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      color:#130b13;
      font-family: Georgia, "Times New Roman", serif;
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      z-index:3;
      position:relative;
      padding:2px 2px 0;
    }
    .brand .badge{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:16px;
      font-weight:700;
      letter-spacing:0;
      text-transform:none;
    }
    .brand .badge i{
      display:inline-grid;
      place-items:center;
      width:24px;height:24px;
      border-radius:50%;
      background:#120d12;
      color:#fff;
      font-style:normal;
      font-size:13px;
      box-shadow:0 6px 14px rgba(0,0,0,.12);
    }
    .brand .word{
      text-align:right;
      line-height:1.05;
      font-weight:600;
    }
    .hero{
      width:min(420px,100%);
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:10px 0 0;
      position:relative;
      z-index:2;
    }
    .blob{
      position:absolute;
      inset:auto;
      width:92%;
      max-width:410px;
      aspect-ratio:1/1;
      border-radius:48% 52% 44% 56%/55% 42% 58% 45%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.88) 0 14%, transparent 15%),
        radial-gradient(circle at 70% 26%, rgba(255,255,255,.55) 0 10%, transparent 11%),
        linear-gradient(145deg, rgba(242,152,181,.9), rgba(242,194,208,.88));
      filter:blur(.2px);
      box-shadow: inset 0 0 40px rgba(255,255,255,.18);
      transform:translateY(12px);
      z-index:-2;
      animation:blobMove 10s ease-in-out infinite;
    }
    .blob.a{top:13%; left:50%; translate:-50% 0; opacity:.95;}
    .blob.b{
      width:74%;
      top:20%;
      left:50%;
      translate:-50% 0;
      opacity:.55;
      background:linear-gradient(145deg, rgba(255,255,255,.34), rgba(255,210,224,.12));
      filter:blur(18px);
      animation-duration:14s;
    }
    .cake-wrap{
      width:min(430px, 100%);
      height:min(55vh, 490px);
      position:relative;
      display:grid;
      place-items:center;
      margin-top:10px;
    }
    .cake-card-shadow{
      position:absolute;
      inset:auto;
      bottom:38px;
      width:78%;
      height:90px;
      border-radius:50%;
      background:rgba(186,90,125,.12);
      filter:blur(12px);
      transform:scaleY(.55);
      animation:shadowPulse 4.2s ease-in-out infinite;
    }
    .cake-svg{
      width:min(96%, 470px);
      height:auto;
      filter:drop-shadow(0 18px 28px rgba(148,67,103,.18));
      animation:cakeBob 4.8s ease-in-out infinite;
    }
    .sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .sparkles .dot{
      position:absolute;
      color:rgba(255,255,255,.95);
      text-shadow:0 0 8px rgba(255,255,255,.45);
      animation:twinkle var(--d,3s) ease-in-out infinite;
      transform-origin:center;
    }
    .sparkles .star{
      position:absolute;
      color:#fff2ac;
      filter:drop-shadow(0 0 6px rgba(255,224,108,.45));
      animation:twinkle var(--d,3s) ease-in-out infinite;
      transform-origin:center;
    }
    .title{
      margin-top:-8px;
      text-align:center;
      z-index:2;
      width:min(420px,100%);
      color:#100810;
    }
    .title .line{
      display:flex;
      align-items:center;
      gap:14px;
      justify-content:center;
      margin-bottom:8px;
    }
    .title .line::before,.title .line::after{
      content:"";
      width:28%;
      height:1.5px;
      background:linear-gradient(90deg, transparent, rgba(49,22,33,.82), transparent);
    }
    .title h1{
      margin:0;
      font-family: "STSong","Songti SC","SimSun",serif;
      font-size: clamp(30px, 8.2vw, 54px);
      font-weight:500;
      letter-spacing:.08em;
      line-height:1;
    }
    .title .sub{
      font-family: Georgia, "Times New Roman", serif;
      margin-top:8px;
      line-height:.88;
      font-size: clamp(22px, 6vw, 38px);
      letter-spacing:.03em;
      font-weight:600;
    }
    .title .desc{
      margin:12px 0 0;
      font-size:14px;
      color:#3b1f2f;
      letter-spacing:.08em;
    }
    .footer-info{
      width:min(420px,100%);
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      color:#23111d;
      font-family: Georgia, "Times New Roman", serif;
      padding:16px 4px 0;
      margin-top:8px;
      font-size:14px;
      position:relative;
      z-index:2;
    }
    .footer-info .right{
      text-align:right;
      font-style:italic;
      line-height:1.02;
    }
    .scroll-hint{
      position:absolute;
      left:50%;
      bottom:12px;
      translate:-50% 0;
      font-size:12px;
      color:rgba(43,16,32,.72);
      letter-spacing:.18em;
      text-transform:uppercase;
      z-index:3;
      animation:hintBounce 1.7s ease-in-out infinite;
      user-select:none;
    }
    .scroll-hint::after{
      content:"";
      display:block;
      width:1px;
      height:18px;
      background:linear-gradient(180deg, transparent, rgba(38,17,31,.55), transparent);
      margin:6px auto 0;
    }

    .page-two{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 16px 22px;
    }
    .page-two .back-blob{
      position:absolute;
      width:84vw;
      max-width:430px;
      aspect-ratio:1/1;
      left:50%;
      top:9%;
      translate:-50% 0;
      border-radius:42% 58% 54% 46%/44% 42% 58% 56%;
      background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.88), rgba(255,255,255,.18) 24%, rgba(247,196,214,.56) 42%, rgba(247,196,214,.08) 72%, rgba(255,255,255,0) 74%);
      filter:blur(.2px);
      z-index:0;
      animation:blobMove 12s ease-in-out infinite reverse;
    }
    .poster{
      width:min(436px, 100%);
      min-height:min(86vh, 760px);
      background:linear-gradient(180deg, rgba(255,252,253,.96), rgba(255,248,251,.93));
      border:10px solid rgba(239,164,190,.55);
      box-shadow:var(--shadow);
      position:relative;
      padding:10px 14px 14px;
      z-index:2;
      overflow:hidden;
      animation:cardRise .9s cubic-bezier(.2,.9,.2,1) both;
    }
    .poster::before{
      content:"";
      position:absolute;
      inset:6px;
      border:1px solid rgba(246,186,207,.92);
      pointer-events:none;
    }
    .poster::after{
      content:"";
      position:absolute;
      inset:auto 12px 12px 12px;
      height:18px;
      border-top:1px solid rgba(244,174,196,.75);
      pointer-events:none;
    }
    .topline{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      color:#ee7b8f;
      font-family: Georgia, "Times New Roman", serif;
      font-style:italic;
      font-size:14px;
      line-height:1;
      padding:2px 6px 8px;
      border-bottom:1px solid rgba(244,174,196,.75);
      letter-spacing:.03em;
      text-transform:uppercase;
    }
    .topline .cn{
      letter-spacing:.12em;
      font-style:normal;
      font-size:13px;
    }
    .poster-body{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding:16px 0 0;
    }
    .candle-board{
      width:min(100%, 310px);
      background:radial-gradient(circle at 30% 0%, rgba(255,255,255,.2), transparent 52%), #111;
      border-radius:2px;
      box-shadow:0 14px 26px rgba(0,0,0,.08);
      padding:12px 10px 10px;
      position:relative;
      overflow:hidden;
    }
    .candle-board::before{
      content:"";
      position:absolute;
      inset:-30% -10%;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,91,91,.22) 0 8px, transparent 9px),
        radial-gradient(circle at 82% 20%, rgba(255,205,86,.24) 0 7px, transparent 8px),
        radial-gradient(circle at 38% 68%, rgba(255,255,255,.08) 0 1px, transparent 1.5px);
      opacity:.9;
      pointer-events:none;
      mix-blend-mode:screen;
      animation:boardGlow 6s ease-in-out infinite;
    }
    .candle-row{
      display:flex;
      justify-content:center;
      align-items:flex-end;
      gap:2px;
      position:relative;
      z-index:1;
      perspective:800px;
    }
    .candle-row.top{
      margin-top:2px;
      gap:3px;
    }
    .candle-row.bottom{
      margin-top:2px;
      gap:2px;
    }
    .candle-letter{
      position:relative;
      display:inline-flex;
      align-items:flex-end;
      justify-content:center;
      width:34px;
      height:58px;
      font-family:Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size:32px;
      line-height:1;
      color:#fffcf0;
      text-shadow:
        0 0 1px rgba(255,255,255,.8),
        0 0 10px rgba(255,255,255,.2);
      background:linear-gradient(180deg, var(--c1), var(--c2));
      border-radius:11px 11px 14px 14px;
      box-shadow:
        inset 0 -7px 0 rgba(0,0,0,.08),
        inset 0 10px 16px rgba(255,255,255,.22),
        0 0 0 1px rgba(255,255,255,.06);
      transform-origin:center bottom;
      animation:candleWiggle 2.9s ease-in-out infinite;
    }
    .candle-letter::before{
      content:"";
      position:absolute;
      left:50%;
      top:-18px;
      width:10px;
      height:18px;
      translate:-50% 0;
      border-radius:50% 50% 45% 45%;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.95) 0 16%, rgba(255,242,175,.95) 18%, rgba(255,205,88,.98) 42%, rgba(255,152,63,.96) 76%, rgba(255,152,63,0) 78%);
      box-shadow:0 0 14px rgba(255,203,97,.55);
      transform-origin:center bottom;
      animation:flame 1.15s ease-in-out infinite;
    }
    .candle-letter:nth-child(2n)::before{animation-duration:1.3s}
    .candle-letter:nth-child(3n)::before{animation-duration:.95s}
    .avatar-wrap{
      width:96px;
      height:96px;
      border-radius:50%;
      position:relative;
      margin-top:2px;
      display:grid;
      place-items:center;
      animation:floaty 4.5s ease-in-out infinite;
    }
    .avatar-ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:2px solid rgba(246,129,162,.85);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.94) 0 30%, rgba(251,197,214,.35) 31% 47%, rgba(255,255,255,.06) 48% 58%, transparent 59%);
      box-shadow:
        0 0 0 7px rgba(255, 182, 207, .26),
        inset 0 0 18px rgba(255,255,255,.38);
      animation:ringSpin 14s linear infinite;
    }
    .avatar{
      position:relative;
      width:72px;
      height:72px;
      border-radius:50%;
      background:linear-gradient(180deg, #a9d0f4 0%, #6ea3d6 100%);
      overflow:hidden;
      box-shadow: inset 0 10px 16px rgba(255,255,255,.16);
    }
    .avatar::before{
      content:"";
      position:absolute;
      left:50%;
      top:17px;
      width:26px;
      height:26px;
      translate:-50% 0;
      border-radius:50%;
      background:#fff;
      box-shadow:0 0 0 2px rgba(255,255,255,.5);
    }
    .avatar::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-2px;
      translate:-50% 0;
      width:54px;
      height:34px;
      border-radius:50% 50% 18px 18px;
      background:#fff;
      box-shadow:0 -2px 0 rgba(255,255,255,.45);
    }
    .name{
      color:#ef738a;
      font-size:13px;
      letter-spacing:.05em;
      margin:0;
    }
    .message{
      margin:0;
      color:#e25f7a;
      text-align:center;
      line-height:1.75;
      font-size:13px;
      padding:0 8px;
      white-space:pre-wrap;
      text-shadow:0 1px 0 rgba(255,255,255,.35);
      animation:fadeUp 1s .18s both;
    }
    .footer{
      width:100%;
      text-align:center;
      color:#ce879b;
      font-family: Georgia, "Times New Roman", serif;
      font-style:italic;
      font-size:14px;
      padding-top:4px;
      border-top:1px solid rgba(244,174,196,.75);
      margin-top:6px;
      letter-spacing:.04em;
    }
    .page-two .hint{
      position:absolute;
      right:14px;
      top:16px;
      width:26px;
      height:26px;
      border-radius:50%;
      background:rgba(130,130,130,.24);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.55);
      display:grid;
      place-items:center;
      color:#fff;
      font-size:13px;
      z-index:3;
      animation:fadePulse 2.5s ease-in-out infinite;
    }
    .ornaments{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }
    .ornament{
      position:absolute;
      opacity:.9;
      font-size:14px;
      animation:driftUp var(--d,7s) linear infinite;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.18));
    }

    .is-active .cake-svg,
    .is-active .title,
    .is-active .footer-info,
    .is-active .poster,
    .is-active .message{
      animation-play-state:running;
    }
    .title,
    .footer-info,
    .poster{
      animation-play-state:paused;
    }

    @keyframes cakeBob{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-10px) scale(1.01)}
    }
    @keyframes blobMove{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(0,-10px,0) scale(1.02)}
    }
    @keyframes twinkle{
      0%,100%{transform:translateY(0) scale(.88); opacity:.5}
      50%{transform:translateY(-8px) scale(1.14); opacity:1}
    }
    @keyframes hintBounce{
      0%,100%{transform:translate(-50%,0)}
      50%{transform:translate(-50%,7px)}
    }
    @keyframes shadowPulse{
      0%,100%{transform:scaleX(1) scaleY(.55); opacity:.72}
      50%{transform:scaleX(1.06) scaleY(.5); opacity:.95}
    }
    @keyframes cardRise{
      from{opacity:0; transform:translateY(24px) scale(.97)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }
    @keyframes boardGlow{
      0%,100%{opacity:.72; transform:scale(1)}
      50%{opacity:1; transform:scale(1.01)}
    }
    @keyframes candleWiggle{
      0%,100%{transform:rotate(-.6deg) translateY(0)}
      50%{transform:rotate(.7deg) translateY(-1px)}
    }
    @keyframes flame{
      0%,100%{transform:translateX(-50%) scaleY(1) scaleX(1); filter:hue-rotate(0deg)}
      50%{transform:translateX(-50%) scaleY(1.08) scaleX(.88); filter:hue-rotate(-4deg)}
    }
    @keyframes floaty{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }
    @keyframes ringSpin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }
    @keyframes fadeUp{
      from{opacity:0; transform:translateY(12px)}
      to{opacity:1; transform:translateY(0)}
    }
    @keyframes fadePulse{
      0%,100%{transform:scale(1); opacity:.55}
      50%{transform:scale(1.08); opacity:.95}
    }
    @keyframes driftUp{
      from{transform:translateY(24px) translateX(0) rotate(0deg); opacity:0}
      12%{opacity:.9}
      to{transform:translateY(-120vh) translateX(var(--dx, 20px)) rotate(8deg); opacity:0}
    }

    @media (max-width: 420px){
      .page-one{padding:14px 14px 18px}
      .brand{font-size:12px}
      .brand .badge{font-size:14px}
      .cake-wrap{height:min(53vh, 440px)}
      .footer-info{font-size:13px}
      .title .desc{font-size:12px}
      .poster{border-width:8px; padding-inline:12px}
      .topline{font-size:12px}
      .candle-letter{width:30px;height:54px;font-size:28px}
      .message{font-size:12px;line-height:1.7}
    }
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none !important; transition:none !important; scroll-behavior:auto !important}
    }
  </style>
</head>
<body>
  <main>
    <section class="page page-one" id="page1">
      <div class="blob a"></div>
      <div class="blob b"></div>
      <div class="sparkles" id="sparkles-1" aria-hidden="true"></div>

      <div class="brand">
        <div class="badge"><i>∞</i><span>工会祝福</span></div>
        <div class="word">
          <div>BIRTHDAY</div>
          <div>CARD</div>
        </div>
      </div>

      <div class="hero">
        <div class="cake-wrap">
          <div class="cake-card-shadow"></div>
          <svg class="cake-svg" viewBox="0 0 500 430" aria-label="生日蛋糕插画">
            <defs>
              <linearGradient id="plate" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#fffdf8"/>
                <stop offset="100%" stop-color="#f8d7e4"/>
              </linearGradient>
              <linearGradient id="tier1" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#ffe9ef"/>
                <stop offset="100%" stop-color="#f7c4d5"/>
              </linearGradient>
              <linearGradient id="tier2" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#fff2f4"/>
                <stop offset="100%" stop-color="#f7d3df"/>
              </linearGradient>
              <linearGradient id="tier3" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#fff8ef"/>
                <stop offset="100%" stop-color="#f0d1c1"/>
              </linearGradient>
              <linearGradient id="pinkDrip" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#ffd0de"/>
                <stop offset="100%" stop-color="#f1a8bf"/>
              </linearGradient>
              <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
                <feGaussianBlur stdDeviation="6" result="blur"/>
                <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.6 0 0 1 0 0.8 0 0 0 .26 0"/>
                <feMerge>
                  <feMergeNode/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <ellipse cx="250" cy="356" rx="156" ry="24" fill="rgba(165,74,112,.12)"/>
            <ellipse cx="250" cy="352" rx="166" ry="28" fill="url(#plate)"/>
            <ellipse cx="250" cy="342" rx="140" ry="18" fill="#f6e3ea"/>

            <g transform="translate(0,4)">
              <ellipse cx="250" cy="278" rx="128" ry="22" fill="#f8d4df"/>
              <rect x="128" y="228" width="244" height="70" rx="28" fill="url(#tier1)"/>
              <g fill="#fff5f7">
                <circle cx="144" cy="297" r="12"/><circle cx="171" cy="297" r="12"/><circle cx="198" cy="297" r="12"/>
                <circle cx="226" cy="297" r="12"/><circle cx="254" cy="297" r="12"/><circle cx="282" cy="297" r="12"/>
                <circle cx="310" cy="297" r="12"/><circle cx="338" cy="297" r="12"/><circle cx="362" cy="297" r="12"/>
              </g>
              <g fill="#ffcfda">
                <circle cx="168" cy="295" r="4"/><circle cx="186" cy="293" r="4"/><circle cx="204" cy="296" r="4"/>
                <circle cx="222" cy="293" r="4"/><circle cx="240" cy="295" r="4"/><circle cx="258" cy="293" r="4"/>

  <script>
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function addOrnaments(rootId, count, kind) {
      const root = document.getElementById(rootId);
      if (!root) return;
      const symbols = kind === 'heart' ? ['♥', '♡'] : ['✦', '•', '✧'];
      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.className = 'ornament';
        span.textContent = symbols[i % symbols.length];
        span.style.left = Math.random() * 100 + '%';
        span.style.top = (80 + Math.random() * 20) + '%';
        span.style.fontSize = (10 + Math.random() * 14) + 'px';
        span.style.color = kind === 'heart'
          ? ['#ff9ab8','#ff769a','#ffc1d4'][i % 3]
          : ['#ffffff','#fff2ad','#ffd5e2'][i % 3];
        span.style.setProperty('--d', (4 + Math.random() * 5) + 's');
        span.style.setProperty('--dx', ((Math.random() * 80) - 40) + 'px');
        span.style.animationDelay = (Math.random() * 6) + 's';
        root.appendChild(span);
      }
    }

    function activatePages() {
      const pages = document.querySelectorAll('.page');
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('is-active');
        });
      }, { threshold: 0.45 });
      pages.forEach(page => io.observe(page));
      pages[0].classList.add('is-active');
    }

    if (!prefersReduced) {
      addOrnaments('ornaments-1', 14, 'sparkle');
      addOrnaments('ornaments-2', 16, 'heart');
      activatePages();
    } else {
      addOrnaments('ornaments-1', 4, 'sparkle');
      addOrnaments('ornaments-2', 4, 'heart');
    }
  </script>
