<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      /* 青年女性：珊瑚粉橘 */
      --bg1:#fff8f5;
      --bg2:#fff0eb;
      --bg3:#fffdfb;
      --primary:#e07a5f;
      --primary-light:#f2a08a;
      --accent:#f4d03f;
      --text:#5a4a45;
      --text-light:#8a7a75;
      --card-bg:rgba(255,255,255,0.96);
      --shadow:0 8px 32px rgba(224,122,95,0.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg3) 0%,var(--bg1) 30%,var(--bg2) 100%);
      overflow-y:auto;
      scroll-snap-type:y mandatory;
    }
    .page{
      min-height:100vh;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:40px 24px;
      scroll-snap-align:start;
    }

    /* 第一页 */
    .page-one{gap:32px}
    .header{text-align:center}
    .union-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 24px;
      background:var(--card-bg);
      border-radius:24px;
      box-shadow:var(--shadow);
      font-size:14px;
      color:var(--primary);
      letter-spacing:3px;
      font-weight:500;
      border:1px solid rgba(224,122,95,0.1);
    }
    .union-badge::before{content:"✦";font-size:16px;color:var(--accent)}

    .hero-visual{
      width:min(220px,55vw);
      height:min(220px,55vw);
      position:relative;
      display:grid;
      place-items:center;
    }
    .hero-circle{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:linear-gradient(135deg,var(--primary-light) 0%,var(--primary) 100%);
      opacity:0.1;
      animation:pulse 3s ease-in-out infinite;
    }
    .hero-circle::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:50%;
      border:2px dashed var(--primary-light);
      opacity:0.3;
      animation:rotate 20s linear infinite;
    }
    .hero-icon{
      font-size:68px;
      filter:drop-shadow(0 4px 12px rgba(224,122,95,0.2));
      animation:float 2.5s ease-in-out infinite;
    }

    .main-title{text-align:center}
    .recipient{
      font-size:clamp(42px,12vw,68px);
      font-weight:600;
      color:var(--primary);
      letter-spacing:10px;
      margin-bottom:14px;
      font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
    }
    .greeting-line{
      font-size:clamp(18px,4.5vw,24px);
      color:var(--text-light);
      letter-spacing:5px;
      display:flex;
      align-items:center;
      gap:16px;
      justify-content:center;
    }
    .greeting-line::before,
    .greeting-line::after{
      content:"";
      width:40px;
      height:1.5px;
      background:linear-gradient(90deg,transparent,var(--primary-light),transparent);
      border-radius:1px;
    }

    .sender-info{
      text-align:center;
      padding:22px 36px;
      background:var(--card-bg);
      border-radius:20px;
      box-shadow:var(--shadow);
      border:1px solid rgba(224,122,95,0.08);
      position:relative;
    }
    .sender-info::before{
      content:"💐";
      position:absolute;
      top:-15px;
      left:50%;
      transform:translateX(-50%);
      font-size:24px;
      background:var(--card-bg);
      padding:0 10px;
      border-radius:50%;
    }
    .sender-label{
      font-size:12px;
      color:var(--text-light);
      letter-spacing:2px;
      margin-bottom:8px;
      margin-top:5px;
    }
    .sender-name{
      font-size:18px;
      font-weight:500;
      color:var(--primary);
      letter-spacing:2px;
    }

    .scroll-tip{
      position:absolute;
      bottom:28px;
      left:50%;
      transform:translateX(-50%);
      font-size:12px;
      color:var(--text-light);
      letter-spacing:2px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      opacity:0.6;
    }
    .scroll-tip::after{content:"♡";font-size:14px;animation:pulse 1.5s infinite}

    /* 第二页 */
    .page-two{
      background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 60%,var(--bg3) 100%);
      position:relative;
    }
    .page-two::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 80% 20%,rgba(244,208,63,0.1) 0%,transparent 40%),
                 radial-gradient(circle at 20% 80%,rgba(224,122,95,0.08) 0%,transparent 40%);
      pointer-events:none;
    }
    .card-container{
      width:100%;
      max-width:400px;
      background:var(--card-bg);
      border-radius:28px;
      padding:44px 32px;
      box-shadow:var(--shadow);
      position:relative;
      border:1px solid rgba(224,122,95,0.06);
    }
    .card-container::before{
      content:"";
      position:absolute;
      top:14px;
      left:14px;
      right:14px;
      bottom:14px;
      border:1.5px solid rgba(224,122,95,0.1);
      border-radius:20px;
      pointer-events:none;
    }

    .card-header{
      text-align:center;
      margin-bottom:36px;
      padding-bottom:24px;
      border-bottom:1px solid rgba(224,122,95,0.1);
      position:relative;
    }
    .card-header::before{
      content:"🌸";
      position:absolute;
      top:-10px;
      left:50%;
      transform:translateX(-50%);
      font-size:20px;
      background:var(--card-bg);
      padding:0 12px;
    }
    .card-title{
      font-size:20px;
      color:var(--primary);
      letter-spacing:6px;
      font-weight:600;
      margin-bottom:8px;
    }
    .card-subtitle{
      font-size:10px;
      color:var(--text-light);
      letter-spacing:3px;
      text-transform:uppercase;
    }

    .blessing-content{
      text-align:center;
      line-height:2.6;
      font-size:16px;
      color:var(--text);
      letter-spacing:0.5px;
      min-height:160px;
      display:flex;
      align-items:center;
      justify-content:center;
      white-space:pre-line;
      padding:0 8px;
    }

    .card-footer{
      text-align:center;
      margin-top:36px;
      padding-top:24px;
      border-top:1px solid rgba(224,122,95,0.1);
    }
    .signature{
      font-size:14px;
      color:var(--text-light);
      letter-spacing:2px;
      margin-bottom:6px;
    }
    .date{
      font-size:12px;
      color:var(--primary-light);
      letter-spacing:1px;
    }

    .deco-flower{
      position:absolute;
      font-size:28px;
      opacity:0.15;
      animation:float 4s ease-in-out infinite;
    }
    .deco-flower.f1{top:60px;left:30px;animation-delay:0s}
    .deco-flower.f2{top:100px;right:35px;animation-delay:1s}
    .deco-flower.f3{bottom:150px;left:25px;animation-delay:2s}

    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:0.1}
      50%{transform:scale(1.08);opacity:0.15}
    }
    @keyframes rotate{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }
    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    @media (max-width:400px){
      .page{padding:32px 20px}
      .card-container{padding:36px 24px;border-radius:24px}
      .recipient{letter-spacing:6px}
      .greeting-line{letter-spacing:3px}
    }
    @media (prefers-reduced-motion:reduce){*{animation:none !important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="header">
      <div class="union-badge">工会祝福</div>
    </div>
    <div class="hero-visual">
      <div class="hero-circle"></div>
      <div class="hero-icon">🎂</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">来自</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip">向下查看祝福</div>
  </section>

  <section class="page page-two">
    <div class="deco-flower f1">❀</div>
    <div class="deco-flower f2">✿</div>
    <div class="deco-flower f3">❀</div>
    <div class="card-container">
      <div class="card-header">
        <h2 class="card-title">生日祝福</h2>
        <p class="card-subtitle">Happy Birthday</p>
      </div>
      <div class="blessing-content">{{blessing}}</div>
      <div class="card-footer">
        <p class="signature">{{sender}} 敬上</p>
        <p class="date">{{year}}年</p>
      </div>
    </div>
  </section>
</body>
</html>
