<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,viewport-fit=cover">
<title>🎂 寿桃祝福 · 生日贺卡</title>
<style>
    /* ===== 主题变量 ===== */
    :root {
        --bg-body: #fefcf3;
        --text-primary: #333;
        --card-bg: rgba(255,255,255,0.5);
        --card-border: rgba(255,183,77,0.25);
        --card-glow: rgba(255,183,77,0.08);
        --card-spin-1: rgba(255,183,77,0.22);
        --card-spin-2: rgba(255,215,64,0.16);
        --card-header-1: rgba(255,183,77,0.12);
        --card-header-2: rgba(255,215,64,0.08);
        --label-color: #e65100;
        --name-color: #bf360c;
        --dept-color: #e65100;
        --divider-color: #ffd54f;
        --row-text: #4e342e;
        --row-bg: rgba(255,183,77,0.08);
        --row-bg-hover: rgba(255,183,77,0.15);
        --avatar-bg: linear-gradient(135deg, #ffd54f, #ffb74d);
        --avatar-shadow: rgba(255,183,77,0.25);
        --avatar-ring: rgba(255,183,77,0.2);
        --bless-border: rgba(255,183,77,0.2);
        --bless-glow: rgba(255,183,77,0.08);
        --bless-spin-1: rgba(255,183,77,0.22);
        --bless-spin-2: rgba(255,215,64,0.16);
        --bless-header-1: rgba(255,183,77,0.1);
        --bless-header-2: rgba(255,215,64,0.06);
        --bless-label-color: #e65100;
        --bless-title-color: #bf360c;
        --bless-text-color: #3e2723;
        --bless-footer-border: rgba(255,183,77,0.25);
        --sign-color: #5d4037;
        --date-color: #795548;
        --arrow-color: rgba(255,255,255,0.7);
        --dot-bg: rgba(255,255,255,0.35);
        --dot-active: #ffd54f;
        --dot-glow: rgba(255,215,64,0.5);
        --music-border: rgba(255,255,255,0.3);
        --music-color: #ffb74d;
        --music-hover: rgba(255,183,77,0.15);
        --orbit-color: rgba(255,180,60,0.2);
        --orbit-color-2: rgba(255,180,60,0.1);
        --orbit-color-3: rgba(255,180,60,0.05);
        --page-overlay: rgba(0,0,0,0);
    }

    /* ===== 公共样式 ===== */
/* ========================================================
   生日贺卡公共样式表
   所有模板共享的基础 CSS，主题色通过 CSS 变量注入
   ======================================================== */

* { margin: 0; padding: 0; box-sizing: border-box; }
body, html {
    width: 100%; height: 100%; overflow: hidden;
    font-family: "PingFang SC","Microsoft YaHei", sans-serif;
    touch-action: none;
    color: var(--text-primary, #333);
    background: var(--bg-body, #fefcf3);
}

/* ===== 背景 / 拖尾 Canvas ===== */
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#trailCanvas { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

/* ===== 翻页容器 ===== */
.swiper-container {
    width: 100%; height: 100%; position: relative; z-index: 10;
    display: flex; flex-direction: column;
    transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
}
.page {
    min-height: 100vh; width: 100%; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden; padding: 24px;
}

/* ===== 封面 / 尾封专属 Canvas ===== */
.page-canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

/* ===== 封面装饰层 ===== */
.cover-decor { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
.cover-bubble {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: coverBubble var(--dur, 6s) var(--delay, 0s) ease-in-out infinite;
}
@keyframes coverBubble {
    0% { transform: translateY(0) scale(0.6); opacity: 0; }
    15% { opacity: var(--op, 0.5); transform: translateY(-20px) scale(1); }
    85% { opacity: var(--op, 0.5); }
    100% { transform: translateY(-100vh) scale(0.4); opacity: 0; }
}
.cover-star {
    position: absolute; opacity: 0;
    animation: coverStar var(--dur, 4s) var(--delay, 0s) ease-in-out infinite;
}
@keyframes coverStar {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    20% { opacity: var(--op, 0.7); }
    50% { transform: translateY(-12px) rotate(180deg) scale(1.1); }
    80% { opacity: var(--op, 0.7); }
}
.cover-spiral {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    border-radius: 50%; border: 1.5px solid;
    animation: spiralExpand var(--dur, 5s) var(--delay, 0s) ease-out infinite;
}
@keyframes spiralExpand {
    0% { width: 0; height: 0; opacity: 0.8; }
    100% { width: min(90vw, 500px); height: min(90vw, 500px); opacity: 0; }
}

/* ===== 中央大视觉 ===== */
.center-visual {
    position: relative; z-index: 5;
    display: grid; place-items: center;
}
.main-emoji {
    font-size: clamp(70px, 20vw, 120px);
    animation: mainBounce 3s ease-in-out infinite;
    filter: drop-shadow(0 12px 35px rgba(255,170,50,0.3));
}
@keyframes mainBounce {
    0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
    25% { transform: translateY(-18px) rotate(2deg) scale(1.03); }
    50% { transform: translateY(0) rotate(-1deg) scale(1); }
    75% { transform: translateY(-10px) rotate(1deg) scale(1.02); }
}
.orbit-ring {
    position: absolute; inset: -18%; border-radius: 50%;
    border: 2px dashed var(--orbit-color, rgba(255,180,60,0.2));
    animation: orbitSpin 12s linear infinite;
}
.orbit-ring:nth-child(2) {
    inset: -30%;
    border-color: var(--orbit-color-2, rgba(255,180,60,0.1));
    animation-duration: 18s; animation-direction: reverse;
}
.orbit-ring:nth-child(3) {
    inset: -42%;
    border-color: var(--orbit-color-3, rgba(255,180,60,0.05));
    animation-duration: 24s;
}
@keyframes orbitSpin { to { transform: rotate(360deg); } }
.orbit-dot {
    position: absolute; width: 10px; height: 10px; border-radius: 50%;
    top: 50%; left: 50%;
    animation: orbitDot 4s linear infinite;
}
@keyframes orbitDot {
    0% { transform: rotate(0deg) translateX(min(38vw, 180px)) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(min(38vw, 180px)) rotate(-360deg); }
}

/* ===== 第2页：员工信息卡 ===== */
.page-2 { background: var(--page2-bg, none); }
.info-card {
    width: 88%; max-width: 420px; position: relative; z-index: 5;
    background: var(--card-bg, rgba(255,255,255,0.92));
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid var(--card-border, rgba(240,98,146,0.2));
    border-radius: 24px; padding: 0; text-align: center;
    box-shadow: 0 16px 50px rgba(0,0,0,0.06), 0 0 30px var(--card-glow, rgba(240,98,146,0.06));
    overflow: hidden;
}
.info-card::before {
    content: ""; position: absolute; inset: -1px; border-radius: 24px; pointer-events: none;
    background: conic-gradient(from 0deg, transparent, var(--card-spin-1, rgba(240,98,146,0.22)), transparent, var(--card-spin-2, rgba(245,124,158,0.16)), transparent);
    z-index: -1; animation: borderSpin 8s linear infinite;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude; -webkit-mask-composite: xor;
    padding: 1.5px;
}
@keyframes borderSpin { to { transform: rotate(360deg); } }

.info-card-header {
    padding: 32px 32px 20px;
    background: linear-gradient(135deg, var(--card-header-1, rgba(240,98,146,0.08)), var(--card-header-2, rgba(245,124,158,0.05)));
}
.info-avatar {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;
    background: var(--avatar-bg, linear-gradient(135deg, #f48fb1, #ec407a));
    display: grid; place-items: center; font-size: 32px; color: #fff;
    box-shadow: 0 8px 24px var(--avatar-shadow, rgba(240,98,146,0.25));
    position: relative;
}
.info-avatar::after {
    content: ""; position: absolute; inset: -5px; border-radius: 50%;
    border: 2px solid var(--avatar-ring, rgba(240,98,146,0.2));
    animation: avatarRing 3s ease-in-out infinite;
}
@keyframes avatarRing {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 0.2; }
}
.info-label {
    font-size: 11px; color: var(--label-color, #ec407a);
    letter-spacing: 5px; text-transform: uppercase; margin-bottom: 4px;
}
.info-name {
    font-size: clamp(26px, 7vw, 38px); font-weight: 700;
    color: var(--name-color, #c2185b); letter-spacing: 4px;
}
.info-dept {
    font-size: clamp(12px, 2.5vw, 15px);
    color: var(--dept-color, #ec407a); letter-spacing: 2px; padding: 6px 0 20px;
}
.info-card-body {
    padding: 0 32px 32px; max-height: 40vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.info-divider {
    width: 60px; height: 2px; margin: 0 auto 22px;
    background: linear-gradient(90deg, transparent, var(--divider-color, #f48fb1), transparent);
}
.info-details { display: flex; flex-direction: column; gap: 14px; }
.info-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: clamp(13px, 3vw, 15px); color: var(--row-text, #555);
    padding: 8px 16px; border-radius: 10px;
    background: var(--row-bg, rgba(240,98,146,0.05));
    transition: background 0.3s;
}
.info-row:hover { background: var(--row-bg-hover, rgba(240,98,146,0.1)); }
.info-row .icon { font-size: 18px; }

/* ===== 第3页：祝福语卡 ===== */
.page-3 { background: var(--page3-bg, none); }
.bless-card {
    width: 88%; max-width: 420px; position: relative; z-index: 5;
    background: var(--card-bg, rgba(255,255,255,0.92));
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid var(--bless-border, rgba(245,124,158,0.15));
    border-radius: 24px; padding: 0; text-align: center;
    box-shadow: 0 16px 50px rgba(0,0,0,0.06), 0 0 30px var(--bless-glow, rgba(245,124,158,0.05));
    overflow: hidden;
}
.bless-card::before {
    content: ""; position: absolute; inset: -1px; border-radius: 24px; pointer-events: none;
    background: conic-gradient(from 0deg, transparent, var(--bless-spin-1, rgba(245,124,158,0.2)), transparent, var(--bless-spin-2, rgba(236,64,122,0.14)), transparent);
    z-index: -1; animation: borderSpin 7s linear infinite;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude; -webkit-mask-composite: xor;
    padding: 1.5px;
}
.bless-card-header {
    padding: 28px 28px 18px;
    background: linear-gradient(135deg, var(--bless-header-1, rgba(245,124,158,0.06)), var(--bless-header-2, rgba(236,64,122,0.04)));
}
.bless-header {
    font-size: 11px; color: var(--bless-label-color, #ec407a);
    letter-spacing: 5px; text-transform: uppercase; margin-bottom: 4px;
}
.bless-title {
    font-size: clamp(20px, 5vw, 28px); font-weight: 600;
    color: var(--bless-title-color, #c2185b); letter-spacing: 3px;
}
.bless-card-body {
    padding: 24px 28px; max-height: 42vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.bless-text {
    text-align: left; font-size: clamp(14px, 3.2vw, 16px); line-height: 1.9;
    color: var(--bless-text-color, #5d4037); text-indent: 2em; white-space: pre-wrap;
}
.bless-card-footer {
    padding: 18px 28px 28px;
    border-top: 1px dashed var(--bless-footer-border, rgba(245,124,158,0.2));
    display: flex; flex-direction: column; gap: 4px;
}
.bless-sign { font-size: 14px; color: var(--sign-color, #884477); letter-spacing: 2px; }
.bless-date { font-size: 12px; color: var(--date-color, #b57595); letter-spacing: 1px; }

/* ===== 第4页：尾封 ===== */
.page-4 {
    background: var(--page4-bg, none);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 30px; text-align: center;
}
.final-emoji {
    font-size: 120px; margin-bottom: 20px;
    animation: finalBounce 2s infinite ease-in-out;
}
.final-title {
    font-size: clamp(30px, 8vw, 42px);
    color: var(--final-title-color, #c2185b);
    font-weight: 700; margin-bottom: 16px; letter-spacing: 2px;
}
.final-text {
    font-size: clamp(18px, 4.5vw, 22px);
    color: var(--final-text-color, #664466);
    line-height: 1.8;
}
@keyframes finalBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* ===== 入场动画 ===== */
.anim-item {
    opacity: 0; transform: translateY(28px);
    transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
}
.anim-item.visible { opacity: 1; transform: translateY(0); }
.anim-d1 { transition-delay: 0.1s; }
.anim-d2 { transition-delay: 0.2s; }
.anim-d3 { transition-delay: 0.3s; }
.anim-d4 { transition-delay: 0.4s; }
.anim-d5 { transition-delay: 0.5s; }
.anim-d6 { transition-delay: 0.6s; }
.anim-d7 { transition-delay: 0.7s; }
.anim-d8 { transition-delay: 0.8s; }

/* ===== 箭头 ===== */
.arrow {
    position: absolute; bottom: 26px; left: 50%; width: 24px; height: 24px;
    border-right: 2.5px solid var(--arrow-color, rgba(236,64,122,0.5));
    border-bottom: 2.5px solid var(--arrow-color, rgba(236,64,122,0.5));
    transform: translateX(-50%) rotate(45deg);
    animation: arrowBounce 1.8s ease-in-out infinite;
    cursor: pointer; z-index: 20; opacity: 0.6;
}
@keyframes arrowBounce {
    0%, 100% { transform: translateX(-50%) rotate(45deg) translateY(0); opacity: 0.4; }
    50% { transform: translateX(-50%) rotate(45deg) translateY(-10px); opacity: 0.8; }
}

/* ===== 翻页指示点 ===== */
.page-dots {
    position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px; z-index: 50;
}
.page-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dot-bg, rgba(236,64,122,0.25)); transition: all 0.4s;
}
.page-dot.active {
    background: var(--dot-active, #ec407a);
    box-shadow: 0 0 8px var(--dot-glow, rgba(236,64,122,0.4));
    transform: scale(1.4);
}

/* ===== 音乐按钮 ===== */
.music-btn {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
    border: 1.5px solid var(--music-border, rgba(236,64,122,0.25));
    display: grid; place-items: center; cursor: pointer;
    font-size: 17px; color: var(--music-color, #ec407a); transition: all 0.3s;
}
.music-btn:hover { background: var(--music-hover, rgba(236,64,122,0.15)); transform: scale(1.1); }
.music-btn.playing { animation: musicSpin 3s linear infinite; }
@keyframes musicSpin { to { transform: rotate(360deg); } }

/* ===== 粒子爆炸 ===== */
.particle-burst { position: absolute; pointer-events: none; z-index: 5; }
.burst-dot {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: burstFly var(--bdur, 1s) var(--bdelay, 0s) ease-out forwards;
}
@keyframes burstFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--bx, 50px), var(--by, -60px)) scale(0); opacity: 0; }
}

/* ===== 浮动装饰 ===== */
.float-items { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.float-item {
    position: absolute; opacity: 0;
    animation: floatUp var(--dur, 7s) var(--delay, 0s) ease-in-out infinite;
}
@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
    12% { opacity: 0.6; transform: translateY(-15px) rotate(8deg) scale(1); }
    88% { opacity: 0.6; }
    100% { transform: translateY(-105vh) rotate(var(--rot, 15deg)) scale(0.6); opacity: 0; }
}

/* ===== 页面遮罩 ===== */
.page::before {
    content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: var(--page-overlay, rgba(0,0,0,0));
}

/* ===== 响应式 ===== */
@media (max-width: 420px) {
    .info-card-header { padding: 24px 20px 16px; }
    .info-card-body { padding: 0 20px 24px; }
    .bless-card-header { padding: 22px 20px 14px; }
    .bless-card-body { padding: 18px 20px; }
    .bless-card-footer { padding: 14px 20px 22px; }
}

/* ===== 无障碍 ===== */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}

<script>
// ===== 公共脚本 =====
/* ========================================================
   生日贺卡公共脚本
   所有模板共享的 JS 逻辑：翻页、动画、音乐、粒子
   主题特定的 Canvas 背景通过 window.__theme 配置注入
   ======================================================== */

// ========================================================
//  翻页控制
// ========================================================
let currentPage = 0;
const totalPages = 4;
const swiper = document.getElementById('swiper');
const dots = document.querySelectorAll('.page-dot');

function updateSlide() {
    swiper.style.transform = `translateY(-${currentPage * 100}vh)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === currentPage));
    triggerPageAnim(currentPage);
}
function nextPage() {
    if (currentPage < totalPages - 1) { currentPage++; updateSlide(); burstPage(); }
}
function prevPage() {
    if (currentPage > 0) { currentPage--; updateSlide(); }
}

let tSY = 0;
document.addEventListener('touchstart', e => { tSY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
    const d = tSY - e.changedTouches[0].clientY;
    if (d > 45) nextPage(); else if (d < -45) prevPage();
});

let wheelLock = false;
document.addEventListener('wheel', e => {
    e.preventDefault();
    if (wheelLock) return;
    wheelLock = true;
    if (e.deltaY > 0) nextPage(); else prevPage();
    setTimeout(() => wheelLock = false, 850);
}, { passive: false });

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); prevPage(); }
});

// ========================================================
//  入场动画触发
// ========================================================
function triggerPageAnim(pageIndex) {
    const pageEl = document.getElementById('page' + (pageIndex + 1));
    if (!pageEl) return;
    const items = pageEl.querySelectorAll('.anim-item');
    items.forEach(item => item.classList.remove('visible'));
    void pageEl.offsetWidth;
    items.forEach((item, i) => {
        setTimeout(() => item.classList.add('visible'), 80);
    });
}

// 首屏加载时触发第一页动画（否则 .anim-item 一直保持 opacity:0 不显示）
setTimeout(() => triggerPageAnim(0), 300);

// ========================================================
//  Canvas 背景 — 根据主题配置选择
// ========================================================
(function() {
    const c = document.getElementById('bgCanvas');
    if (!c) return;
    const ctx = c.getContext('2d');
    let W, H;
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
    window.addEventListener('resize', resize); resize();

    const theme = window.__theme || {};
    const bgType = theme.bgType || 'bubbles';

    if (bgType === 'bubbles') {
        // 默认：泡泡 + 金色光点
        const bubbles = [];
        for (let i = 0; i < 30; i++) {
            bubbles.push({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 16 + 5, vx: (Math.random() - 0.5) * 0.35,
                vy: -Math.random() * 0.4 - 0.12,
                alpha: Math.random() * 0.1 + 0.02, hue: Math.random() * 50 + 40
            });
        }
        const sparkles = [];
        for (let i = 0; i < 45; i++) {
            sparkles.push({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 1.8 + 0.4, alpha: Math.random(),
                speed: Math.random() * 0.25 + 0.04, twinkle: Math.random() * Math.PI * 2
            });
        }
        (function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, W, H);
            bubbles.forEach(b => {
                b.x += b.vx; b.y += b.vy;
                if (b.y + b.r < 0) { b.y = H + b.r; b.x = Math.random() * W; }
                if (b.x < -b.r) b.x = W + b.r;
                if (b.x > W + b.r) b.x = -b.r;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${b.hue}, 65%, 65%, ${b.alpha})`; ctx.fill();
                ctx.beginPath(); ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.22, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${b.hue}, 50%, 88%, ${b.alpha * 1.4})`; ctx.fill();
            });
            sparkles.forEach(s => {
                s.twinkle += 0.018;
                const a = 0.12 + Math.sin(s.twinkle) * 0.22;
                ctx.fillStyle = `rgba(255, 180, 60, ${a})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                s.y -= s.speed;
                if (s.y < -5) { s.y = H + 5; s.x = Math.random() * W; }
            });
        })();

    } else if (bgType === 'petals') {
        // 花瓣雨
        const petals = [];
        const petalColors = theme.petalColors || ['#f48fb1','#f06292','#ec407a','#f8bbd0'];
        for (let i = 0; i < 40; i++) {
            petals.push({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 6 + 3, vy: Math.random() * 0.8 + 0.3,
                vx: Math.random() * 0.4 - 0.2, rot: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 2,
                color: petalColors[Math.floor(Math.random() * petalColors.length)],
                alpha: Math.random() * 0.3 + 0.1
            });
        }
        (function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, W, H);
            petals.forEach(p => {
                p.y += p.vy; p.x += p.vx + Math.sin(p.y * 0.01) * 0.3;
                p.rot += p.rotSpeed;
                if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
                ctx.save();
                ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.ellipse(0, 0, p.r, p.r * 0.6, 0, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            });
        })();

    } else if (bgType === 'confetti') {
        // 彩屑下落
        const pieces = [];
        const confettiColors = theme.confettiColors || ['#ec407a','#f48fb1','#ffb74d','#ffd54f','#ce93d8','#81c784'];
        for (let i = 0; i < 50; i++) {
            pieces.push({
                x: Math.random() * W, y: Math.random() * H,
                w: Math.random() * 6 + 3, h: Math.random() * 10 + 5,
                vy: Math.random() * 1.0 + 0.3, rot: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 3,
                color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
                alpha: Math.random() * 0.3 + 0.08
            });
        }
        (function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, W, H);
            pieces.forEach(p => {
                p.y += p.vy; p.rot += p.rotSpeed;
                p.x += Math.sin(p.y * 0.008) * 0.5;
                if (p.y > H + 15) { p.y = -15; p.x = Math.random() * W; }
                ctx.save();
                ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });
        })();

    } else if (bgType === 'starfield') {
        // 明亮星空 + 流星（无暗色背景，适配浅色页面）
        const stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 2 + 0.5, twinkle: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.015 + 0.008,
                hue: Math.random() * 40 + 30 // warm golden hues
            });
        }
        const shootingStars = [];
        let shootTimer = 0;
        (function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, W, H);
            stars.forEach(s => {
                s.twinkle += s.speed;
                const a = 0.15 + Math.sin(s.twinkle) * 0.35;
                if (a <= 0) return;
                ctx.save();
                ctx.globalAlpha = Math.max(0, a);
                ctx.fillStyle = `hsl(${s.hue}, 70%, 65%)`;
                ctx.shadowBlur = 6; ctx.shadowColor = `hsl(${s.hue}, 70%, 65%)`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });
            shootTimer++;
            if (shootTimer % 200 === 0) {
                shootingStars.push({
                    x: Math.random() * W * 0.7, y: Math.random() * H * 0.3,
                    vx: 3 + Math.random() * 3, vy: 2 + Math.random() * 2,
                    life: 1, decay: 0.018 + Math.random() * 0.01,
                    trail: []
                });
            }
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                s.trail.push({ x: s.x, y: s.y });
                if (s.trail.length > 15) s.trail.shift();
                s.x += s.vx; s.y += s.vy; s.life -= s.decay;
                if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
                // Draw trail
                for (let j = 0; j < s.trail.length; j++) {
                    const t = s.trail[j];
                    const ta = (j / s.trail.length) * s.life * 0.6;
                    ctx.save(); ctx.globalAlpha = ta;
                    ctx.fillStyle = `hsl(40, 80%, 70%)`;
                    ctx.beginPath(); ctx.arc(t.x, t.y, 1.2, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
                // Draw head
                ctx.save(); ctx.globalAlpha = s.life;
                ctx.fillStyle = '#ffd54f'; ctx.shadowBlur = 8; ctx.shadowColor = '#ffd54f';
                ctx.beginPath(); ctx.arc(s.x, s.y, 2, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        })();
    }
})();

// ========================================================
//  鼠标/触摸拖尾
// ========================================================
(function() {
    const c = document.getElementById('trailCanvas');
    if (!c) return;
    const ctx = c.getContext('2d');
    let W, H;
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
    window.addEventListener('resize', resize); resize();

    const trailDots = [];
    const maxDots = 40;
    function addDot(x, y) {
        const theme = window.__theme || {};
        const trailHue = theme.trailHue || 80;
        trailDots.push({
            x, y, alpha: 0.7, size: Math.random() * 4 + 2,
            color: `hsl(${Math.random() * 50 + trailHue}, 65%, 65%)`
        });
        if (trailDots.length > maxDots) trailDots.shift();
    }
    document.addEventListener('mousemove', e => addDot(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => {
        for (let i = 0; i < e.touches.length; i++) addDot(e.touches[i].clientX, e.touches[i].clientY);
    }, { passive: true });

    (function loop() {
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < trailDots.length; i++) {
            const d = trailDots[i];
            d.alpha -= 0.015; d.size *= 0.97;
            if (d.alpha <= 0) { trailDots.splice(i, 1); i--; continue; }
            ctx.save();
            ctx.globalAlpha = d.alpha; ctx.fillStyle = d.color;
            ctx.shadowBlur = 8; ctx.shadowColor = d.color;
            ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    })();
})();

// ========================================================
//  浮动装饰
// ========================================================
(function() {
    const container = document.getElementById('floatItems');
    if (!container) return;
    const theme = window.__theme || {};
    const items = theme.floatEmojis || ['🌟','✨','💫','🌸','🍃','⭐','🎀','💛','🩷','🌼'];
    const count = theme.floatCount || 14;
    for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.className = 'float-item';

            left: ${Math.random() * 95}%; bottom: -30px;
            font-size: ${12 + Math.random() * 14}px;
            --dur: ${6 + Math.random() * 8}s; --delay: ${Math.random() * 12}s;
            --rot: ${Math.random() * 40 - 20}deg;
        `;
        container.appendChild(span);
    }
})();

// ========================================================
//  翻页粒子爆炸
// ========================================================
function burstPage() {
    const pageEl = document.getElementById('page' + (currentPage + 1));
    if (!pageEl) return;
    const burst = document.createElement('div');
    burst.className = 'particle-burst';
    burst.style.left = '50%'; burst.style.top = '50%';
    const theme = window.__theme || {};
    const colors = theme.burstColors || ['#ec407a','#f48fb1','#f8bbd0','#ffb74d','#ff8a65','#ce93d8'];
    for (let i = 0; i < 28; i++) {
        const dot = document.createElement('div');
        dot.className = 'burst-dot';
        const angle = (Math.PI * 2 / 28) * i;
        const dist = 45 + Math.random() * 90;
        dot.style.cssText = `
            width: 5px; height: 5px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            --bx: ${Math.cos(angle) * dist}px; --by: ${Math.sin(angle) * dist}px;
            --bdur: ${0.5 + Math.random() * 0.7}s; --bdelay: ${Math.random() * 0.15}s;
        `;
        burst.appendChild(dot);
    }
    pageEl.appendChild(burst);
    setTimeout(() => burst.remove(), 2000);
}

// ========================================================
//  点击触发粒子
// ========================================================
document.addEventListener('click', function(e) {
    if (e.target.closest('.music-btn') || e.target.closest('.arrow') || e.target.closest('.page-dot')) return;
    const cx = e.clientX, cy = e.clientY;
    const container = document.getElementById('page' + (currentPage + 1));
    if (!container) return;
    const burst = document.createElement('div');
    burst.className = 'particle-burst';
    burst.style.left = cx + 'px'; burst.style.top = cy + 'px';
    const theme = window.__theme || {};
    const colors = theme.clickColors || ['#ec407a','#f48fb1','#ffb74d','#ff8a65','#ce93d8','#ffd54f'];
    for (let i = 0; i < 16; i++) {
        const dot = document.createElement('div');
        dot.className = 'burst-dot';
        const angle = (Math.PI * 2 / 16) * i;
        const dist = 20 + Math.random() * 55;
        dot.style.cssText = `
            width: 4px; height: 4px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            --bx: ${Math.cos(angle) * dist}px; --by: ${Math.sin(angle) * dist}px;
            --bdur: ${0.4 + Math.random() * 0.5}s; --bdelay: 0s;
        `;
        burst.appendChild(dot);
    }
    container.appendChild(burst);
    setTimeout(() => burst.remove(), 1200);
});

// ========================================================
//  音乐盒（Web Audio API 合成 Happy Birthday）
// ========================================================
(function() {
    let ac = null, playing = false, timer = null;
    const B = 0.42;
    const melody = [
        {f:262,t:0,d:B*.75},{f:262,t:B*.75,d:B*.25},
        {f:294,t:B*1,d:B},{f:262,t:B*2,d:B},
        {f:349,t:B*3,d:B},{f:330,t:B*4,d:B*2},
        {f:262,t:B*6,d:B*.75},{f:262,t:B*6.75,d:B*.25},
        {f:294,t:B*7,d:B},{f:262,t:B*8,d:B},
        {f:392,t:B*9,d:B},{f:349,t:B*10,d:B*2},
        {f:262,t:B*12,d:B*.75},{f:262,t:B*12.75,d:B*.25},
        {f:523,t:B*13,d:B},{f:440,t:B*14,d:B},
        {f:349,t:B*15,d:B},{f:330,t:B*16,d:B},{f:294,t:B*17,d:B*2},
        {f:349,t:B*19,d:B*.75},{f:349,t:B*19.75,d:B*.25},
        {f:440,t:B*20,d:B},{f:349,t:B*21,d:B},
        {f:392,t:B*22,d:B},{f:349,t:B*23,d:B*2}
    ];
    const bass = [
        {f:131,t:0,d:B*2},{f:175,t:B*2,d:B*2},{f:131,t:B*4,d:B*2},
        {f:131,t:B*6,d:B*2},{f:175,t:B*8,d:B*2},{f:131,t:B*10,d:B*2},
        {f:131,t:B*12,d:B*2},{f:175,t:B*14,d:B*2},{f:131,t:B*16,d:B*2},
        {f:131,t:B*18,d:B},{f:175,t:B*19,d:B*2},{f:131,t:B*21,d:B*2},{f:131,t:B*23,d:B*2}
    ];
    const LOOP = B * 25.5;

    function box(freq, t, dur, vol) {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.012);
        g.gain.exponentialRampToValueAtTime(vol * 0.3, t + dur * 0.4);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g).connect(ac.destination);
        o.start(t); o.stop(t + dur + 0.01);
        const o2 = ac.createOscillator(), g2 = ac.createGain();
        o2.type = 'sine'; o2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(vol * 0.06, t + 0.008);
        g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.5);
        o2.connect(g2).connect(ac.destination);
        o2.start(t); o2.stop(t + dur * 0.5 + 0.01);
    }
    function bassN(freq, t, dur, vol) {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.03);
        g.gain.setValueAtTime(vol, t + dur * 0.7);
        g.gain.linearRampToValueAtTime(0, t + dur);
        o.connect(g).connect(ac.destination);
        o.start(t); o.stop(t + dur + 0.01);
    }
    function playLoop() {
        if (!ac) return;
        const t0 = ac.currentTime + 0.05;
        melody.forEach(n => box(n.f, t0 + n.t, n.d, 0.07));
        bass.forEach(n => bassN(n.f, t0 + n.t, n.d, 0.02));
        timer = setTimeout(playLoop, LOOP * 1000);
    }

    const btn = document.getElementById('musicBtn');

    // 在用户手势中创建 AudioContext（浏览器要求必须在交互事件中创建）
    async function startMusic() {
        if (playing) return true;
        try {
            if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
            if (ac.state === 'suspended') await ac.resume();
            if (ac.state === 'running') {
                playing = true; btn.classList.add('playing'); btn.textContent = '🎶'; playLoop();
                return true;
            }
        } catch(e) { console.warn('音乐启动失败:', e); }
        return false;
    }
    function stopMusic() {
        if (!playing) return;
        if (timer) clearTimeout(timer);
        if (ac) { ac.close(); ac = null; }
        playing = false; btn.classList.remove('playing'); btn.textContent = '🔇';
    }
    btn.addEventListener('click', e => { e.stopPropagation(); if (playing) stopMusic(); else startMusic(); });

    // 创建全屏启动遮罩
    const splash = document.createElement('div');
    splash.id = 'splashOverlay';
    splash.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);cursor:pointer;transition:opacity 0.5s;';
    splash.innerHTML = '<div style="font-size:56px;animation:splashPulse 1.5s ease-in-out infinite;margin-bottom:18px;">🎂</div><div style="color:#fff;font-size:15px;text-shadow:0 1px 8px rgba(0,0,0,0.4);letter-spacing:3px;">轻触屏幕 · 开启祝福</div><style>@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}</style>';
    document.body.appendChild(splash);

    let splashGone = false;
    function dismissSplash() {
        if (splashGone) return;
        splashGone = true;
        splash.style.opacity = '0';
        splash.style.pointerEvents = 'none';
        setTimeout(() => { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 600);
    }

    // 页面加载时静默尝试自动播放（桌面浏览器通常允许）
    startMusic().then(ok => {
        if (ok) {
            // 自动播放成功，至少展示1.5秒后隐藏遮罩
            setTimeout(dismissSplash, 1500);
        }
        // 如果失败，遮罩保留，等待用户交互
    });

    // 核心：用户点击/触摸遮罩时，无论音乐是否成功，都关闭遮罩
    async function handleSplashInteraction() {
        await startMusic(); // 尝试播放，但不以成功为前提条件
        dismissSplash();    // 无论如何都关闭遮罩，用户可以之后用右上角按钮开音乐
    }

    splash.addEventListener('click', handleSplashInteraction);
    splash.addEventListener('touchend', function(e) {
        e.preventDefault(); // 阻止后续 click 重复触发
        handleSplashInteraction();
    });

    // 后备：任何文档级交互也触发关闭（防止 splash 事件被意外阻断）
    function onDocInteraction() {
        if (!splashGone) {
            startMusic();
            dismissSplash();
        }
        document.removeEventListener('click', onDocInteraction, true);
        document.removeEventListener('touchend', onDocInteraction, true);
    }
    document.addEventListener('click', onDocInteraction, { capture: true });
    document.addEventListener('touchend', onDocInteraction, { capture: true });
})();

</script>
