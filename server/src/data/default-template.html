<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>生日快乐 - {{name}}</title>
  <style>
    :root{--bg1:#fbe0ea;--pink:#d76f97;--ink:#241521}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg1),#f6ccdc);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{max-width:420px;width:100%;padding:30px 20px;text-align:center;background:rgba(255,255,255,.9);border-radius:20px;box-shadow:0 10px 40px rgba(153,55,95,.15)}
    .cake{font-size:80px;margin:20px 0}
    h1{font-size:32px;color:#100810;margin:10px 0}
    .sub{font-size:18px;color:#3b1f2f;margin:10px 0}
    .message{font-size:14px;line-height:1.8;color:#241521;margin:20px 0;padding:0 10px;white-space:pre-wrap}
    .footer{font-size:12px;color:#ce879b;margin-top:20px;border-top:1px solid #f2b2c8;padding-top:10px}
    .info{font-size:13px;color:#666;margin:5px 0}
  </style>
</head>
<body>
  <div class="card">
    <div class="cake">🎂</div>
    <h1>生日快乐</h1>
    <p class="sub">HAPPY BIRTHDAY</p>
    
    <div class="info">亲爱的 {{name}}</div>
    <div class="info">{{department}}</div>
    
    <p class="message">{{blessing}}</p>
    
    <div class="footer">Wishing you a happy birthday - {{year}}</div>
  </div>
</body>
</html>
