<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>{{name}}的生日贺卡</title>
  <style>
    :root{
      --bg1:#fff5f7;
      --bg2:#ffe8ed;
      --bg3:#fff0f3;
      --primary:#e0688a;
      --primary-light:#f4a8be;
      --primary-dark:#c2456e;
      --text:#4a3540;
      --text-light:#8a6a78;
      --card:rgba(255,255,255,0.95);
      --shadow:0 12px 40px rgba(224,104,138,0.15);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:linear-gradient(160deg,var(--bg3) 0%,var(--bg1) 40%,var(--bg2) 100%);
      overflow-y:auto;
      scroll-snap-type:y mandatory;
    }
    .page{
      min-height:100vh;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:36px 24px;
      scroll-snap-align:start;
      overflow:hidden;
    }

    /* ===== 第一页：封面 ===== */
    .page-one{gap:28px}
    .page-one::before{
      content:"";
      position:absolute;
      top:-50px;right:-50px;
      width:200px;height:200px;
      background:radial-gradient(circle,rgba(244,168,190,0.3) 0%,transparent 70%);
      border-radius:50%;
    }
    .page-one::after{
      content:"";
      position:absolute;
      bottom:-30px;left:-30px;
      width:160px;height:160px;
      background:radial-gradient(circle,rgba(224,104,138,0.15) 0%,transparent 70%);
      border-radius:50%;
    }

    .union-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 20px;
      background:var(--card);
      border-radius:20px;
      box-shadow:var(--shadow);
      font-size:13px;
      color:var(--primary);
      letter-spacing:3px;
      position:relative;z-index:1;
    }
    .union-badge::before{content:"✿";font-size:14px}

    .hero-visual{
      width:200px;height:200px;
      position:relative;
      display:grid;place-items:center;
    }
    .hero-ring{
      position:absolute;inset:0;
      border:2px dashed var(--primary-light);
      border-radius:50%;
      animation:spin 20s linear infinite;
    }
    .hero-ring::before{
      content:"♥ ✿ ♥ ✿ ♥ ✿";
      position:absolute;
      width:100%;height:100%;
      font-size:10px;
      color:var(--primary-light);
      letter-spacing:8px;
      animation:spin 15s linear infinite reverse;
    }
    .hero-icon{
      font-size:64px;
      filter:drop-shadow(0 4px 12px rgba(224,104,138,0.25));
      animation:float 3s ease-in-out infinite;
      position:relative;z-index:1;
    }

    .main-title{text-align:center;position:relative;z-index:1}
    .recipient{
      font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
      font-size:clamp(32px,9vw,52px);
      font-weight:600;
      background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:6px;
      margin-bottom:12px;
    }
    .greeting-line{
      font-size:clamp(16px,4vw,22px);
      color:var(--text-light);
      letter-spacing:5px;
      display:flex;align-items:center;gap:12px;justify-content:center;
    }
    .greeting-line::before,.greeting-line::after{
      content:"";width:36px;height:1px;
      background:linear-gradient(90deg,transparent,var(--primary-light),transparent);
    }

    .sender-info{
      text-align:center;
      padding:16px 28px;
      background:var(--card);
      border-radius:14px;
      box-shadow:var(--shadow);
      position:relative;z-index:1;
    }
    .sender-label{font-size:12px;color:var(--text-light);letter-spacing:2px;margin-bottom:6px}
    .sender-name{font-size:16px;font-weight:500;color:var(--primary);letter-spacing:2px}

    .scroll-tip{
      position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
      font-size:11px;color:var(--text-light);letter-spacing:2px;
      display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0.6;
    }
    .scroll-tip::after{content:"↓";font-size:14px;animation:bounce 1.5s infinite}

    /* ===== 第二页：祝福 ===== */
    .page-two{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
    .card-container{
      width:100%;max-width:380px;
      background:var(--card);
      border-radius:18px;
      padding:36px 28px;
      box-shadow:var(--shadow);
      position:relative;
    }
    .card-ornament{
      position:absolute;
      color:var(--primary-light);
      font-size:20px;
      opacity:0.5;
    }
    .card-ornament.tl{top:14px;left:14px}
    .card-ornament.tr{top:14px;right:14px;transform:scaleX(-1)}
    .card-ornament.bl{bottom:14px;left:14px;transform:scaleY(-1)}
    .card-ornament.br{bottom:14px;right:14px;transform:scale(-1,-1)}

    .card-header{
      text-align:center;
      margin-bottom:28px;
      padding-bottom:20px;
      border-bottom:1px solid rgba(224,104,138,0.12);
    }
    .card-title{
      font-size:18px;color:var(--primary);
      letter-spacing:6px;font-weight:500;
      margin-bottom:6px;
    }
    .card-subtitle{font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase}

    .blessing-content{
      text-align:center;
      line-height:2.4;
      font-size:15px;
      color:var(--text);
      letter-spacing:1px;
      min-height:180px;
      display:flex;align-items:center;justify-content:center;
      white-space:pre-line;
    }

    .card-footer{
      text-align:center;
      margin-top:28px;
      padding-top:20px;
      border-top:1px solid rgba(224,104,138,0.12);
    }
    .signature{font-size:13px;color:var(--text-light);letter-spacing:2px}
    .date{font-size:11px;color:var(--primary-light);margin-top:6px;letter-spacing:1px}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

    @media(max-width:400px){
      .page{padding:28px 18px}
      .card-container{padding:28px 22px}
      .hero-visual{width:170px;height:170px}
    }
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <section class="page page-one">
    <div class="union-badge">工会祝福</div>
    <div class="hero-visual">
      <div class="hero-ring"></div>
      <div class="hero-icon">🌸</div>
    </div>
    <div class="main-title">
      <h1 class="recipient">{{name}}</h1>
      <p class="greeting-line">祝你生日快乐</p>
    </div>
    <div class="sender-info">
      <div class="sender-label">来自</div>
      <div class="sender-name">{{sender}}</div>
    </div>
    <div class="scroll-tip">向下查看祝福</div>
  </section>

  <section class="page page-two">
    <div class="card-container">
      <div class="card-ornament tl">✿</div>
      <div class="card-ornament tr">✿</div>
      <div class="card-ornament bl">✿</div>
      <div class="card-ornament br">✿</div>
      <div class="card-header">
        <h2 class="card-title">生日祝福</h2>
        <p class="card-subtitle">Happy Birthday</p>
      </div>
      <!-- editable-start -->
      <div class="blessing-content">{{blessing}}</div>
      <!-- editable-end -->
      <div class="card-footer">
        <p class="signature">{{sender}} 敬上</p>
        <p class="date">{{year}}年</p>
      </div>
    </div>
  </section>
</body>
</html>
