<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,viewport-fit=cover">
<title>生日邀请函-缤纷派对·实体礼盒版</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #fffdf0; touch-action: none; color: #333; }
    
    body::before {
        content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
        background: radial-gradient(circle at 20% 20%, rgba(255, 220, 100, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(255, 190, 100, 0.2) 0%, transparent 50%);
    }

    canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .swiper-container { width: 100%; height: 100%; display: flex; flex-direction: column; transition: transform 0.7s cubic-bezier(0.22,1,0.36,1); z-index: 10; }
    .page { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding:20px;}
    
    /* 2.5D实体礼物盒 */
    .gift-3d {
        position: absolute; z-index: 0; pointer-events: none;
        transform-style: preserve-3d;
    }
    .gift-3d .face { position: absolute; backface-visibility: hidden; }
    .gift-3d .front { width: 100%; height: 70%; bottom: 0; left: 0; border-radius: 4px; }
    .gift-3d .top { 
        width: 100%; height: 30%; top: 0; left: 0; 
        transform: skewX(-30deg) translateY(-15%); transform-origin: bottom left; border-radius: 4px;
    }
    .gift-3d .side { 
        width: 30%; height: 70%; bottom: 0; right: -15%; 
        transform: skewY(-30deg); transform-origin: top left; border-radius: 4px;
    }
    .gift-3d .ribbon-v { 
        position: absolute; left: 50%; top: 0; width: 12%; height: 100%; 
        background: rgba(255,255,255,0.4); transform: translateX(-50%); z-index: 2;
    }
    .gift-3d .ribbon-h { 
        position: absolute; top: 35%; left: 0; width: 100%; height: 12%; 
        background: rgba(255,255,255,0.4); z-index: 2;
    }

    .balloons { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .balloon {
        position: absolute; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        animation: floatUp linear infinite;
    }
    .balloon::after {
        content: ""; position: absolute; bottom: -15px; left: 50%; width: 1px; height: 15px;
        background: rgba(0,0,0,0.15); transform: translateX(-50%);
    }

    @keyframes floatUp {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.85; }
        90% { opacity: 0.85; }
        100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    .title { font-size: 3rem; font-weight: 900; letter-spacing: 6px; color: #b71c1c; text-shadow: 0 2px 10px rgba(183, 28, 28, 0.15); margin-bottom: 10px; z-index: 2; }
    .sub-title { font-size: 1rem; color: #2a9d8f; letter-spacing: 5px; margin-bottom: 40px; z-index: 2; }
    .date { font-size: 0.9rem; color: #666; letter-spacing: 4px; border-bottom: 1px solid rgba(183, 28, 28, 0.3); padding-bottom: 8px; z-index: 2; }

    .card {
        z-index: 10; width: 85%; max-width: 400px; background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px); border: 1px solid rgba(183, 28, 28, 0.15);
        border-radius: 20px; padding: 45px 30px; text-align: center;
        box-shadow: 0 15px 50px rgba(0,0,0,0.06);
    }
    .card-name { font-size: 2rem; color: #b71c1c; margin-bottom: 8px; letter-spacing: 4px; }
    .card-dept { font-size: 0.85rem; color: #2a9d8f; margin-bottom: 25px; letter-spacing: 3px; opacity: 0.8; }
    .card-blessing { text-align: left; font-size: 1rem; line-height: 2.2; color: #444; text-indent: 2em; margin-bottom: 30px; }
    .card-footer { font-size: 0.8rem; color: #e9c46a; letter-spacing: 4px; border-top: 1px dashed rgba(183, 28, 28, 0.3); padding-top: 18px; font-weight: bold; }

    .arrow {
        position: absolute; bottom: 35px; left: 50%; width: 22px; height: 22px;
        border-right: 2px solid #b71c1c; border-bottom: 2px solid #b71c1c;
        transform: translateX(-50%) rotate(45deg); animation: bounce 2s infinite;
        cursor: pointer; z-index: 20; opacity: 0.6;
    }
    @keyframes bounce { 0%,100%{transform:translateX(-50%) rotate(45deg) translateY(0)} 50%{transform:translateX(-50%) rotate(45deg) translateY(-10px)} }

    /* 音乐按钮 */
    .music-btn {
        position: fixed; top: 16px; right: 16px; z-index: 100;
        width: 40px; height: 40px; border-radius: 50%;
        background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
        border: 1.5px solid rgba(183,28,28,0.3);
        display: grid; place-items: center; cursor: pointer;
        font-size: 17px; color: #b71c1c; transition: all 0.3s;
    }
    .music-btn:hover { background: rgba(183,28,28,0.1); transform: scale(1.1); }
    .music-btn.playing { animation: musicSpin 3s linear infinite; }
    @keyframes musicSpin { to { transform: rotate(360deg); } }

    /* 翻页指示点 */
    .page-dots {
        position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 10px; z-index: 50;
    }
    .page-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(183,28,28,0.25); transition: all 0.4s;
    }
    .page-dot.active {
        background: #b71c1c; box-shadow: 0 0 8px rgba(183,28,28,0.4);
        transform: scale(1.4);
    }

    /* 入场动画 */
    .anim-item {
        opacity: 0; transform: translateY(28px);
        transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .anim-item.visible {
        opacity: 1; transform: translateY(0);
    }
    .anim-d1 { transition-delay: 0.1s; }
    .anim-d2 { transition-delay: 0.2s; }
    .anim-d3 { transition-delay: 0.3s; }
    .anim-d4 { transition-delay: 0.4s; }
    .anim-d5 { transition-delay: 0.5s; }

    /* 第四页样式 - 蛋糕已摆正 */
    .final-page {
        text-align: center;
        z-index: 10;
    }
    .final-emoji {
        font-size: 100px;
        animation: cakeBounce 2s infinite ease-in-out;
        margin-bottom: 20px;
        transform: rotate(0deg) !important; /* 强制摆正 */
    }
    /* 纯垂直弹跳，不旋转、不倾斜 */
    @keyframes cakeBounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    .final-title {
        font-size: clamp(28px, 7vw, 40px);
        color: #b71c1c;
        font-weight: 700;
        margin-bottom: 16px;
        letter-spacing: 2px;
    }
    .final-text {
        font-size: clamp(16px, 4vw, 20px);
        color: #666;
        line-height: 1.8;
    }

    /* 粒子爆炸 */
    .particle-burst { position: absolute; pointer-events: none; z-index: 5; }
    .burst-dot {
        position: absolute; border-radius: 50%; opacity: 0;
        animation: burstFly var(--bdur, 1s) var(--bdelay, 0s) ease-out forwards;
    }
    @keyframes burstFly {
        0% { transform: translate(0,0) scale(1); opacity: 1; }
        100% { transform: translate(var(--bx, 50px), var(--by, -60px)) scale(0); opacity: 0; }
    }

    /* 返回后台按钮 */
    .admin-btn {
        position: fixed; top: 16px; left: 16px; z-index: 200;
        display: flex; align-items: center; gap: 6px;
        padding: 7px 14px; border-radius: 20px;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1.5px solid rgba(183,28,28,0.2);
        color: #666; font-size: 12px; letter-spacing: 1px;
        text-decoration: none; cursor: pointer; transition: all 0.3s;
    }
    .admin-btn:hover { background: rgba(183,28,28,0.08); color: #b71c1c; border-color: rgba(183,28,28,0.4); }
    .admin-btn svg { width: 14px; height: 14px; fill: currentColor; }
</style>
</head>
<body>
<!-- 返回后台按钮 -->
<a class="admin-btn" href="http://localhost:5173" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    返回管理后台
</a>

<canvas id="confettiCanvas"></canvas>
<div id="bg-decor"></div>
<div class="balloons" id="balloon-container"></div>

<!-- 翻页指示点 -->
<div class="page-dots" id="pageDots">
    <div class="page-dot active"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
</div>

<div class="swiper-container" id="swiper">
    <!-- 第1页：封面 -->
    <div class="page" id="page1">
        <div class="title anim-item anim-d1">生日快乐</div>
        <div class="sub-title anim-item anim-d2">愿每一天都闪闪发光</div>
        <div class="date anim-item anim-d3">{{year}}</div>
        <div class="arrow" onclick="nextPage()"></div>
    </div>

    <!-- 第2页：员工信息 -->
    <div class="page" id="page2">
        <div class="card anim-item anim-d1">
            <div class="card-name">{{name}}</div>
            <div class="card-dept">{{department}} · {{position}}</div>
            <!-- editable-start -->
            <div class="card-blessing">
                🎂 生日：{{birthday}}<br/>
                📅 入职：{{joinYear}}<br/>
                🏢 部门：{{department}}
            </div>
            <!-- editable-end -->
            <div class="card-footer">HAPPY BIRTHDAY</div>
        </div>
        <div class="arrow" onclick="nextPage()"></div>
    </div>

    <!-- 第3页：祝福语 -->
    <div class="page" id="page3">
        <div class="card anim-item anim-d1">
            <div class="card-name">生日祝福</div>
            <div class="card-dept">BIRTHDAY WISHES</div>
            <!-- editable-start -->
            <div class="card-blessing">{{blessing}}</div>
            <!-- editable-end -->
            <div class="card-footer">{{sender}} · {{year}}年{{month}}月{{day}}日</div>
        </div>
        <div class="arrow" onclick="nextPage()"></div>
    </div>

    <!-- 第4页：结尾祝福（蛋糕已摆正） -->
    <div class="page" id="page4">
        <div class="final-page anim-item anim-d1">
            <div class="final-emoji">🎂</div>
            <h2 class="final-title">岁岁常欢愉</h2>
            <p class="final-text">愿所有美好如期而至<br/>平安喜乐，万事胜意</p>
        </div>
        <div class="arrow" onclick="prevPage()" style="transform:translateX(-50%) rotate(135deg);"></div>
    </div>
</div>

<!-- 音乐按钮 -->
<button class="music-btn" id="musicBtn">🎵</button>

<script>
    // === 翻页逻辑 ===
    let currentPage=0;
    const totalPages=4;
    const swiper=document.getElementById('swiper');
    const dots=document.querySelectorAll('.page-dot');

    function updateSlide(){
        swiper.style.transform=`translateY(-${currentPage*100}vh)`;
        dots.forEach((d,i)=>d.classList.toggle('active',i===currentPage));
        triggerAnim(currentPage);
    }
    function nextPage(){
        if(currentPage<totalPages-1){
            currentPage++;
            updateSlide();
            burstPage();
        }
    }
    function prevPage(){
        if(currentPage>0){
            currentPage--;
            updateSlide();
        }
    }

    // 触摸滑动
    let tSY=0;
    document.addEventListener('touchstart',e=>{tSY=e.touches[0].clientY;},{passive:true});
    document.addEventListener('touchend',e=>{
        const d=tSY-e.changedTouches[0].clientY;
        if(d>50)nextPage();
        else if(d<-50)prevPage();
    });

    // 鼠标滚轮
    let wheelLock=false;
    document.addEventListener('wheel',e=>{
        e.preventDefault();
        if(wheelLock)return;
        wheelLock=true;
        if(e.deltaY>0)nextPage();
        else prevPage();
        setTimeout(()=>wheelLock=false,800);
    },{passive:false});

    // 键盘
    document.addEventListener('keydown',e=>{
        if(e.key==='ArrowDown'||e.key===' ')nextPage();
        if(e.key==='ArrowUp')prevPage();
    });

    // 入场动画
    function triggerAnim(idx){
        const page=document.getElementById('page'+(idx+1));
        if(!page)return;
        const items=page.querySelectorAll('.anim-item');
        items.forEach(i=>i.classList.remove('visible'));
        void page.offsetWidth;
        items.forEach((item,i)=>{
            setTimeout(()=>item.classList.add('visible'),80);
        });
    }

    // === 2.5D礼物盒 ===
    const giftColors = ['#8b0000', '#b71c1c', '#1b5e20', '#0d47a1', '#4a148c', '#e65100'];
    const decorContainer = document.getElementById('bg-decor');
    const giftConfigs = [
        {x:2,y:2,size:90,isLarge:false},
        {x:88,y:3,size:85,isLarge:false},
        {x:3,y:88,size:95,isLarge:false},
        {x:87,y:87,size:80,isLarge:false},
        {x:-5,y:45,size:180,isLarge:true},
        {x:85,y:50,size:170,isLarge:true}
    ];
    giftConfigs.forEach(cfg=>{
        const color=giftColors[Math.floor(Math.random()*giftColors.length)];
        const rotate=Math.random()*20-10;
        const opacity=cfg.isLarge?0.25:0.18;
        const frontColor=color;
        const topColor=`color-mix(in srgb, ${color} 80%, white)`;
        const sideColor=`color-mix(in srgb, ${color} 60%, black)`;
        const gift=document.createElement('div');
        gift.className='gift-3d';
        gift.style.cssText=`left:${cfg.x}%;top:${cfg.y}%;width:${cfg.size}px;height:${cfg.size}px;transform:rotate(${rotate}deg);opacity:${opacity};`;
        gift.innerHTML=`
            <div class="face front" style="background:${frontColor}"><div class="ribbon-v"></div><div class="ribbon-h"></div></div>
            <div class="face top" style="background:${topColor}"><div class="ribbon-v"></div></div>
            <div class="face side" style="background:${sideColor}"><div class="ribbon-h"></div></div>
        `;
        decorContainer.appendChild(gift);
    });

    // === 气球 ===
    const balloonColors=['#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a','#d62828','#ffd700'];
    const balloonContainer=document.getElementById('balloon-container');
    for(let i=0;i<12;i++){
        const size=Math.random()*30+30;
        const color=balloonColors[Math.floor(Math.random()*balloonColors.length)];
        const x=Math.random()*95;
        const duration=Math.random()*8+8;
        const delay=Math.random()*10;
        const balloon=document.createElement('div');
        balloon.className='balloon';
        balloon.style.cssText=`left:${x}%;bottom:-60px;width:${size}px;height:${size*1.2}px;background:${color};animation-duration:${duration}s;animation-delay:${delay}s;`;
        balloonContainer.appendChild(balloon);
    }

    // === 彩屑 ===
    const c=document.getElementById('confettiCanvas'),x=c.getContext('2d');
    function resize(){c.width=innerWidth;c.height=innerHeight;}window.addEventListener('resize',resize);resize();
    let confetti=[];
    const colors=['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#264653','#ffd700'];
    class Confetti{constructor(){this.reset(true);}reset(init){this.x=Math.random()*c.width;this.y=init?Math.random()*c.height:-10;this.s=Math.random()*4+2;this.vy=Math.random()*1+0.5;this.vx=Math.random()*0.6-0.3;this.a=Math.random()*0.7+0.3;this.r=Math.random()*360;this.vr=Math.random()*3-1.5;this.color=colors[Math.floor(Math.random()*colors.length)];}update(){this.y+=this.vy;this.x+=this.vx;this.r+=this.vr;if(this.y>c.height+10)this.reset(false);}draw(){x.save();x.translate(this.x,this.y);x.rotate(this.r*Math.PI/180);x.fillStyle=this.color;x.globalAlpha=this.a;x.fillRect(-this.s/2,-this.s/2,this.s,this.s*1.5);x.restore();x.globalAlpha=1;}}
    for(let i=0;i<60;i++)confetti.push(new Confetti());
    (function loop(){requestAnimationFrame(loop);x.clearRect(0,0,c.width,c.height);confetti.forEach(p=>{p.update();p.draw();});})();

    // === 翻页粒子 ===
    function burstPage(){
        const page=document.getElementById('page'+(currentPage+1));
        if(!page)return;
        const burst=document.createElement('div');
        burst.className='particle-burst';
        burst.style.left='50%';burst.style.top='50%';
        const burstColors=['#b71c1c','#e63946','#f4a261','#e9c46a','#2a9d8f'];
        for(let i=0;i<25;i++){
            const dot=document.createElement('div');
            dot.className='burst-dot';
            const ang=(Math.PI*2/25)*i;
            const dist=50+Math.random()*80;
            dot.style.cssText=`
                width:5px;height:5px;background:${burstColors[Math.floor(Math.random()*burstColors.length)]};
                --bx:${Math.cos(ang)*dist}px;--by:${Math.sin(ang)*dist}px;
                --bdur:${0.5+Math.random()*0.6}s;
            `;
            burst.appendChild(dot);
        }
        page.appendChild(burst);
        setTimeout(()=>burst.remove(),1500);
    }

    // === 生日歌音乐 ===
    (function(){
        let ac=null,playing=false,timer=null;
        const B=0.42;
        const melody=[
            {f:262,t:0,d:B*.75},{f:262,t:B*.75,d:B*.25},
            {f:294,t:B*1,d:B},{f:262,t:B*2,d:B},
            {f:349,t:B*3,d:B},{f:330,t:B*4,d:B*2},
            {f:262,t:B*6,d:B*.75},{f:262,t:B*6.75,d:B*.25},
            {f:294,t:B*7,d:B},{f:262,t:B*8,d:B},
            {f:392,t:B*9,d:B},{f:349,t:B*10,d:B*2},
            {f:262,t:B*12,d:B*.75},{f:262,t:B*12.75,d:B*.25},
            {f:523,t:B*13,d:B},{f:440,t:B*14,d:B},
            {f:349,t:B*15,d:B},{f:330,t:B*16,d:B},{f:294,t:B*17,d:B*2},
            {f:349,t:B*19,d:B*.75},{f:349,t:B*19.75,d:B*.25},
            {f:440,t:B*20,d:B},{f:349,t:B*21,d:B},
            {f:392,t:B*22,d:B},{f:349,t:B*23,d:B*2}
        ];
        const bass=[
            {f:131,t:0,d:B*2},{f:175,t:B*2,d:B*2},{f:131,t:B*4,d:B*2},
            {f:131,t:B*6,d:B*2},{f:175,t:B*8,d:B*2},{f:131,t:B*10,d:B*2},
            {f:131,t:B*12,d:B*2},{f:175,t:B*14,d:B*2},{f:131,t:B*16,d:B*2},
            {f:131,t:B*18,d:B},{f:175,t:B*19,d:B*2},{f:131,t:B*21,d:B*2},{f:131,t:B*23,d:B*2}
        ];
        const LOOP=B*25.5;

        function playTone(freq,t,dur,vol){
            const o=ac.createOscillator(),g=ac.createGain();
            o.type='sine';o.frequency.value=freq;
            g.gain.setValueAtTime(0,t);
            g.gain.linearRampToValueAtTime(vol,t+0.01);
            g.gain.exponentialRampToValueAtTime(0.001,t+dur);
            o.connect(g).connect(ac.destination);
            o.start(t);o.stop(t+dur+0.02);
        }

        function playLoop(){
            if(!ac)return;
            const t0=ac.currentTime+0.05;
            melody.forEach(n=>playTone(n.f,t0+n.t,n.d,0.08));
            bass.forEach(n=>playTone(n.f,t0+n.t,n.d,0.02));
            timer=setTimeout(playLoop,LOOP*1000);
        }

        const btn=document.getElementById('musicBtn');
        function start(){
            if(playing)return;
            if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();
            if(ac.state==='suspended')ac.resume();
            playing=true;btn.classList.add('playing');btn.textContent='🎶';playLoop();
        }
        function stop(){
            if(!playing)return;
            clearTimeout(timer);
            if(ac){ac.close();ac=null;}
            playing=false;btn.classList.remove('playing');btn.textContent='🎵';
        }
        btn.onclick=e=>{e.stopPropagation();playing?stop():start();};

        // 自动播放
        function tryAuto(){
            try{ac=new AudioContext();if(ac.state==='running'){start();return true;}else{ac.close();ac=null;return false;}}catch(e){return false;}
        }
        if(!tryAuto()){
            const evts=['click','touchstart','keydown'];
            function first(){start();evts.forEach(ev=>document.removeEventListener(ev,first,true));}
            evts.forEach(ev=>document.addEventListener(ev,first,{once:true,capture:true}));
        }
    })();

    // 初始化动画
    triggerAnim(0);
</script>
</body>
</html>
