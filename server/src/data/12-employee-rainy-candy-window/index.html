<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>员工生日贺卡·微雨糖果橱窗版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card-app rainy-candy-app" aria-live="polite">
    <canvas id="fxCanvas" aria-hidden="true"></canvas>

    <button class="music-toggle is-paused" type="button" aria-label="音乐开关">
      <span class="music-mark" aria-hidden="true"></span>
    </button>

    <div class="brand-slot">
        <img class="brand-logo" src="../logo.svg" alt="信阳移动"
             onerror="this.style.display='none'; this.nextElementSibling && (this.nextElementSibling.style.display='block')">
        <span class="brand-text" style="display:none">信阳移动</span>
      </div>

    <section class="screen cover active" data-screen="cover">
      <img class="scene-bg" src="assets/generated/01-cover-bg.png" alt="" loading="eager">
      <div class="scene-overlay" aria-hidden="true"></div>
      <p class="page-index">01 / 04</p>
      <div class="copy-stack copy-cover">
        <p class="eyebrow">Rainy Candy Window</p>
        <h1>生日快乐</h1>
        <p class="lead">雨后的橱窗亮着，今天的甜意刚好留给你。</p>
      </div>
    </section>

    <section class="screen wish" data-screen="wish">
      <img class="scene-bg" src="assets/generated/02-wish-bg.png" alt="" loading="lazy">
      <div class="scene-overlay" aria-hidden="true"></div>
      <p class="page-index">02 / 04</p>
      <div class="copy-stack copy-wish copy-name">
        <p class="eyebrow">For {{name}}</p>
        <h2>{{name}}</h2>
        <p class="message-text">{{message}}</p>
        <p class="note">愿你新一岁，心情柔软，步调轻快，每天都有一点被偏爱的甜。</p>
      </div>
    </section>

    <section class="screen highlight" data-screen="highlight">
      <img class="scene-bg" src="assets/generated/03-highlight-bg.png" alt="" loading="lazy">
      <div class="scene-overlay" aria-hidden="true"></div>
      <p class="page-index">03 / 04</p>
      <div class="copy-stack copy-highlight">
        <p class="eyebrow">Gentle Spark</p>
        <h2>你认真发光的样子，一直被看见</h2>
        <p class="lead">那些稳定推进、温和协作、主动回应的瞬间，都在团队记忆里留下了亮色。</p>
      </div>
    </section>

    <section class="screen final" data-screen="final">
      <img class="scene-bg" src="assets/generated/04-final-bg.png" alt="" loading="lazy">
      <div class="scene-overlay" aria-hidden="true"></div>
      <p class="page-index">04 / 04</p>
      <div class="copy-stack copy-final">
        <p class="eyebrow">Sweet Finish</p>
        <h2>愿好运如糖粒，铺满新一岁</h2>
        <p class="lead">生日快乐。愿健康、顺遂和小小惊喜，陪你把往后的日子过得香甜又明亮。</p>
        <p class="sig-company" style="font-size:clamp(22px,6.5vw,32px);font-weight:700;color:currentColor;letter-spacing:2px;margin-top:18px">信阳移动公司工会 敬贺</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
